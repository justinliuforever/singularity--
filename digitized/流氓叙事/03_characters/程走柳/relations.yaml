# 程走柳 · 人物关系（该角色视角，typed）
# type 取值：cp / 亲属 / 敌友 / 上下级 / 化名 / 同盟 / 利用 / 偶像 / 加害者
character: 程走柳

relations:

  # ===== CP =====
  - target: 蒋伯驾
    type: cp
    aliases: [电台哥, 蒋先生, 蒋生, 小蒋, 摇滚哥]
    label: 一生挚爱 / 最初的利用对象
    summary: >
      她的 cp。大学时为借其举荐进 A 社而蓄意接近，相处中动了真心。被她一次次推开、
      他一次次回来，教她"你很重要，你的感受很重要"。荧光海复合；他自首换钱为她治病、
      匿名留赏金与遗书，被判死刑。她"从一开始就选了蒋伯驾"，却终生口是心非。
    typed_facts:
      - 对讲机加密频道"贝姬"，暗语"我们在相同的频道里"。
      - 她知道他是潜伏莱诺家族的卧底记者、缪家掌权人（缪家实贩军火）。
      - 她相信奥丁转述：肖须言疑为蒋伯驾所杀（曾据此质问他）。

  # ===== 亲属 =====
  - target: 程聿怀
    type: 亲属
    relation: 亲哥哥（长五岁，互称"同怀"）
    aliases: [延迟, 同怀, 程记者]
    summary: >
      这世上最亲的人。1994 年家变后她假意吵架把他赶走、为让他奔好前程（他不知是假）。
      第六幕惊知他就是布雷族军师"延迟"，选择等他解释。"同怀之间，不能说对不起"。
    typed_facts:
      - 她隐瞒"自己知道程聿怀失忆"这件事【全局最高级秘密】。
      - 二人"殊途同归"：她重走父亲新闻路澄清，他成延迟推翻凶手。

  - target: 肖须言
    type: 亲属
    relation: 小舅舅（母亲肖明月之弟）
    aliases: [蒋伯驾的舅舅, 战地记者]
    summary: >
      像圣诞老人般带回奇妙"破烂"的战地记者，从不把自己算进家人。她欠他"最好的礼物"。
      已死在 2000 年的布雷诺；安全屋遗物里藏着她当年硬塞的一家五口旧照。

  - target: 程亮冬
    type: 亲属
    relation: 父亲（记者）
    summary: 1994 年在布雷诺领莱诺新闻奖时被当众枪杀、后遭酗酒伤人污蔑。她毕生为他澄清。

  - target: 肖明月
    type: 亲属
    relation: 母亲（历史学教授）
    summary: 虔诚信神、请佛像求远行亲人平安；被舆论连累丢工作，争斗中坠楼身亡。

  # ===== 同盟 / 知己 =====
  - target: 缪宏谟
    type: 同盟
    subtype: 知己 / 表面情敌
    aliases: [缪医生, 小缪, 飞鸟]
    label: 怒河共同创始人
    summary: >
      生死知己、"我的飞鸟"。共建怒河、共谋杀伯纳德；对外刻意扮情敌为彼此作不在场证明，
      以千纸鹤为暗号。各自把名字偷偷放上暗杀名单、想以死赎罪。友情如苔藓暗处生长。

  - target: 奥丁
    type: 同盟
    subtype: 上下级（怒河表面指挥官，受她与缪幕后领导）
    aliases: [狂草帮老大, 怒河指挥官, 硬汉]
    summary: >
      怒河表面上的指挥官，真正幕后是她和缪。讲冷笑话、画丑表情便利贴，多次拿命护她们、
      劝她们删掉名单上自己的名字、戳破她藏血液病独食的事。第七幕守门，与怒河全员牺牲。

  - target: 羌青瓷
    type: 同盟
    subtype: 暗中盟友 / 须守护的牺牲者
    aliases: [瑞法·莱诺, 金狮医院院长, 莱诺家族新任家主]
    label: 程聿怀的爱人
    summary: >
      程聿怀之妻、莱诺家主瑞法·莱诺。曾示警她离开卢特/小心伯纳德、承诺恢复哥哥记忆且绝不
      伤害她和哥哥。月下救花见其真心。后结盟共抗莱诺、自愿牺牲献心脏芯片；她同情愧疚，须
      替羌死守所有秘密、不可露破绽。
    note: 她不掌握羌×程 1990 年纯爱与火柴疗法抹忆的全貌（认知盲区）。

  - target: 以撒
    type: 敌友
    subtype: 亏欠的恩人 / 怒河杀手
    aliases: [小以撒, 逃跑者以撒]
    summary: >
      在布雷诺帮她找回相机的诺族少年、撒该的哥哥；她用虚假新闻害死其妹撒该，深怀愧疚、
      想找时机坦白。后为怒河王牌杀手并自建独立情报网。

  - target: 黛利拉
    type: 同盟
    subtype: 怒河情报官 / 杀手
    aliases: [小黛, 杀手小姐]
    summary: 狂草帮的女儿、怒河情报官；金狮医院械斗中随奥丁救过他们。并肩作战的同伴。

  # ===== 化名同一性 =====
  - target: 羌青瓷=瑞法·莱诺
    type: 化名
    summary: 她知道"羌青瓷"即莱诺家族瑞法·莱诺（西名），同一人。

  # ===== 加害者 / 敌 =====
  - target: 伯纳德·莱诺
    type: 加害者
    aliases: [伯纳德, 莱诺家族第一继承人]
    relation: 羌青瓷的兄长
    summary: >
      逼她制造圣女虚假新闻、给她注射病毒致血液病、在小腿纹泪珠的操纵者与胁迫者；劳伦死亡
      真相的真凶。最终被她与缪宏谟联手所杀。
    note: 区分——伯纳德是羌青瓷的兄长，与"卢特（叔叔）"为不同的人。

  - target: 卢特·莱诺
    type: 利用
    aliases: [卢特]
    relation: 羌青瓷的叔叔 / 蒋伯驾名义上的义父
    summary: >
      年近六十的莱诺家族成员，对她一见倾心、提出娶她。她假意答应订婚、入住其别墅，只为
      利用其背后的莱诺新闻资源接近莱诺核心，并不真心、不打算真结婚；伺机抽身。

  - target: 郭松意
    type: 敌友
    subtype: 已被她搞下台的仇人
    relation: A 社前主编
    summary: 曾拒绝程聿怀澄清父亲之请、为难程聿怀；她雇侦探查到其性侵丑闻、群发将其搞下台。

  - target: 卢正兴
    type: 敌友
    subtype: 已解约的劣迹主编
    relation: A 社继郭松意后的新主编
    summary: 故意把诺族撒该写成布雷族、制造圣女虚假新闻的"没有格局"之人；她与其解约。

  # ===== 偶像 / 受害者 =====
  - target: 劳伦
    type: 偶像
    aliases: [西国传奇女记者]
    summary: >
      她的新闻偶像、新闻象征；为其苦学西国语。采访时没读懂相机藏头诗 HELP（救救我），
      成了压垮她、致其跳楼的最后一根稻草——她毕生的愧疚源。

  - target: 撒该
    type: 敌友
    subtype: 亏欠致死的小女孩
    relation: 以撒的妹妹（诺族小女孩）
    summary: 信任她、让她拍照的诺族小女孩；她用《最美布雷族小女孩》《圣女的诞生》亲手把她推向死亡。
