  第六幕: 配合羌青瓷计划（被绑、与众人结盟共抗莱诺）；得知程聿怀是延迟、肖须言已死（疑蒋所杀）；荧光海与蒋复合；安全屋最后一夜，对程聿怀/缪宏谟/蒋伯驾说心里话；【全局】死守羌青瓷的秘密。
  第七幕及结局: 在五周年纪念会直播现场公布罪证、当众自污认罪；目睹奥丁与怒河守门牺牲、羌青瓷取芯片身亡；送蒋伯驾入警局、用其留下的干净赏金注射抑制剂；与程聿怀雨中和解；最终重返战地、以"土豆袋子里的记者"做最后直播殉职；与蒋伯驾在频道里口是心非道别。

