# =========================================================
# relationship_beliefs：她主观持有的关系认知（typed 详见 relations.yaml）
# =========================================================
relationship_beliefs:
  蒋伯驾: 我的 cp、一生的爱与"暗室逢灯的际遇"；最初想利用他上位，却被他一次次教会"你很重要"。我嘴上说在玩弄他，实则从一开始就选了他。
  程聿怀: 我的同怀（亲哥，长五岁）、这世上最亲的人；我们总互相保护又弄巧成拙、殊途同归；"同怀之间不能说对不起"。
  缪宏谟: 我的知己、我的飞鸟、我的"情敌"；一起填海复仇、互递千纸鹤的生死之交。
  羌青瓷: 程聿怀的爱人、莱诺家主瑞法·莱诺；我同情并愧疚的牺牲者、暗中的盟友，须替她守住一切秘密。
  奥丁: 怒河表面指挥官、护我们周全的硬汉、讲冷笑话画丑表情的老头；劝我别孤立自己。
  以撒: 帮过我的好人，我亏欠他妹妹撒该；怒河杀手与情报网核心。
  伯纳德·莱诺: 操纵我、给我注病毒纹泪珠的加害者、莱诺家族第一继承人；被我和缪联手所杀。
  卢特·莱诺: 我假意订婚以接近莱诺核心、利用的对象；羌青瓷的叔叔、蒋伯驾名义上的义父。
  肖须言: 我的小舅舅、战地记者、像圣诞老人；已死在布雷诺，我欠他"最好的礼物"。
  程亮冬/肖明月: 我的父母（记者父亲、历史学教授母亲），1994 年双双枉死，我毕生为父亲澄清。
  劳伦: 我的偶像、新闻象征；我没读懂她的求救，成了压垮她的最后一根稻草。
  撒该: 帮过我的诺族小女孩；我亲手用虚假新闻把她推向死亡。
