# 程走柳 · 逐幕目标 + 可对外台词脚本
# 来源：A_第1-4幕.md / B_第5-6幕.md / C_第7幕-结局.md 正文【你需要做到——】与抽取的台词。
character: 程走柳

global_constraints:
  - 【全局有效·反复强调】隐瞒"你知道程聿怀失去记忆"这件事，一定一定不要提及。
  - 【十分重要·全局有效】切记，一定不可以泄露羌青瓷和你所说的一切。
  - 不必隐瞒：当年故意接近蒋伯驾是为了利用他（你们已分手多年）。

acts:

  - act: 序幕
    需要做到:
      - 作为第二位发言者，自认是记者、长期制造铺天盖地的虚假新闻。[reveals F002]
    对外台词:
      - "（认罪）我是记者，长期制造铺天盖地的虚假新闻。"

  - act: 第一幕
    场景: 金狮医院开业典礼·异国重逢
    需要做到:
      - 弄清蒋伯驾和那位缪医生看起来很相熟，他们是什么关系。
      - 不用隐瞒你当年故意接近蒋伯驾是为了利用他（已分手多年）。
      - 搞清楚程聿怀和那佩戴孤挺花的人什么时候结的婚、为什么不告诉你。
      - 以撒帮过你、他和妹妹撒该都是好人，也许有误会，尽量帮助他。
      - 场上气氛奇怪，尽量弄清楚每个人之间的关系。
    对外台词:
      - "（对蒋伯驾，初遇/嘴硬）这种人就该拉出去枪毙。……我这种学生，只能用其他办法追赶了。"
      - "（追问哥哥婚事）好好好，我倒要问问程聿怀，是不是日子过得太潇洒，已经忘了自己还有个妹妹？"

  - act: 第二幕
    场景: 追查程聿怀的转变 / 接近卢特
    需要做到:
      - 察觉程聿怀变了（孤挺花到了羌青瓷胸口、情绪被包裹起来——程聿怀有秘密了），外出寻找羌青瓷，询问程聿怀为什么改变许多。
      - 收下肖须言寄来的礼物（花露水/防晒霜/蚊香/眼罩＋信）。
      - 为接近莱诺家族核心，向卢特府邸投递简历与采访信（附最满意的正面照），赴其战地记者交流晚宴。
    对外台词:
      - "（开玩笑回应舅舅担忧）会兑现小时候的诺言，从布雷诺回来后给你带最好的礼物。"
      - "（晚宴上对卢特，借美貌接近，温柔得体的社交辞令——按情境发挥）"

  - act: 第三幕
    场景: 羌青瓷火柴疗法诊疗室
    需要做到:
      - 如果羌青瓷问你来干嘛，就说自己有疑问需要帮助。
      - 听羌青瓷介绍火柴疗法并配合。
      - 关于撒该照片被写错种族的事，还没准备好怎么对以撒开口，等过段时间再坦白。
      - 可全部告诉程聿怀：当年假吵架赶走他、是为让他更好发展；曾雇私家侦探查郭松意丑事并公之于众。借此解开同怀多年的误会。
      - "【全局】隐瞒你知道程聿怀失去记忆的事情，一定一定不要提及。"
      - 可问程聿怀："你和羌青瓷的爱情是怎么开始的？"
      - 可直接问蒋伯驾："蒋大少爷，你不会是一直对我余情未了吧？"
      - 不想回答的问题，可直接把火柴吹灭。
    对外台词:
      - "（如羌青瓷问来意）我有疑问，需要帮助。"
      - "你和羌青瓷的爱情是怎么开始的？"
      - "蒋大少爷，你不会是一直对我余情未了吧？"
      - "（订婚动机自陈给程聿怀）我和卢特订婚，是想利用他背后的莱诺新闻，并没有真正想和他结婚。"

  - act: 第四幕
    场景: 狂草帮专访 / 唱片店 / 拓钥匙 / 被软禁 / 圣女骗局
    需要做到:
      - 在唱片店分享劳伦的事迹（偶像、苦练西国语、采访、未答出她想要的答案、她跳楼、葬礼上认识伯纳德并立誓做最好的记者还父亲清白）。
      - "【全局】隐瞒你知道程聿怀失去记忆的事情，一定一定不要提及。"
      - 拓印延迟书房的锤柄状军火库钥匙、物归原处；走为上计离开卢特府邸。
      - （被动遭遇）被伯纳德软禁、被迫发出第一条虚假新闻《圣女的诞生》。
      - 战后心理治疗：聆听故事，见证罪恶。
    对外台词:
      - "（对奥丁专访的两问）我父亲说，通过记者的镜头与文字，人们便能隔着遥远地对视。而对视，就有无数的可能性。"
      - "（采访会否减少冲突）不，会更多，但这是必要的……人们总能从争论中，生发出越来越清晰的观点。"
      - "（拒绝伯纳德）杀了我吧。（宁可死也不发虚假新闻——后因十多个小女孩性命被迫屈从）"

  - act: 第五幕
    场景: 结盟缪宏谟建怒河 / 杀伯纳德 / 查军火 / 东南亚鳄鱼池
    需要做到:
      - 与缪宏谟结盟、以泪珠/精卫石子为信物，建立复仇组织怒河（提供军火，缪出钱）。
      - 谋划并执行伯纳德"意外身亡"、坐实情敌关系（大闹婚礼、割腕、千纸鹤暗号）。
      - 隐于幕后、让奥丁当表面指挥官；把自己名字放暗杀名单最后。
      - 调查缪家与蒋伯驾的军火交易及与莱诺勾结的证据；寻找肖须言下落。
      - 【五年未见，请出门见羌青瓷一面】——主动去问羌青瓷究竟想做什么。
    对外台词:
      - "（结盟）给我弄一个好看的包扎吧，缪医生。……那我们一起填海吧，缪宏谟。"
      - "（决心，引上官婉儿墓志铭）不怕，无非是潇湘水断，宛委山倾。"
      - "（杀伯纳德·还他原话）多么贫瘠的想象力。"
      - "（与缪并肩宣判）你看不起女人，也看不起友情。可偏偏打败你的，就是女人的友情。"
      - "（对蒋伯驾，鳄鱼池后试探掩饰）我只是想找你，没想到闯入了禁区。"
      - "（拒绝蒋的给予）蒋伯驾，我要的东西，不需要别人给。"
      - "（充电对讲机的暗语）蒋伯驾，我们在相同的频道里。"

  - act: 第六幕
    场景: 配合羌青瓷被绑 / 知真相 / 荧光海复合 / 安全屋最后一夜
    需要做到:
      - 配合羌青瓷计划：被绑出现、和所有人一起站在羌青瓷对立面指责斥骂，对内同情愧疚。
      - 消化真相：程聿怀就是"延迟"；等程聿怀一个解释，无论多久。
      - 得知肖须言已死（疑蒋伯驾所杀）；去肖须言安全屋取遗物、香蕉酒、一家五口旧照；给程聿怀挂指南针。
      - 荧光海上与蒋伯驾摊牌、开枪打其左腿后接住、复合。
      - "【十分重要·全局有效】一定不可以泄露羌青瓷和你所说的一切。"
      - 安全屋最后一夜，对程聿怀/缪宏谟/蒋伯驾说心里话。
    对外台词:
      - "（指南针·送程聿怀）程聿怀，记得回家。广府在赤道的北，家在广府的南。你找不到路就给我打电话，我不管做什么都会去接你的。"
      - "（葬礼陪缪宏谟·学其母口吻）囡囡，拜三下。……囡囡，点灯，小心手。手稍微高一点，别烫着。"
      - "（荧光海开枪）蒋伯驾，如果这一枪我不开，对肖须言和那些因你而死的人不公平。但如果我开了这一枪，对也许有苦衷的你，也不公平。"
      - "（对程聿怀剖白）程聿怀，我不是最终选择他，其实，我是从一开始，就选了蒋伯驾。"
      - 心里话·对程聿怀: "程聿怀，其实我们殊途同归。……你以后可以试着相信我、依靠我，好吗？"
      - 心里话·对缪宏谟: "那些难捱的日子都过去了，以后想哭就大大方方在我面前哭，别再躲到我看不见的地方哭了……缪，我会一直陪着你。"
      - 心里话·对蒋伯驾: "我对你只有一个要求，我希望你不要感染我的血液病，而是健健康康地活着，好吗？"

  - act: 第七幕及结局
    场景: 五周年纪念会直播 / 守门牺牲 / 取芯片 / 送蒋入警局 / 重返战地殉职
    需要做到:
      - 在直播现场把这些年搜集的莱诺家族罪证公之于众、当众自污认罪。
      - 看羌青瓷与莱诺关键人物经暗门逃走时，要表现愤怒、不可露出"知道这是计划"的破绽，收起对羌的怜悯。
      - 面对奥丁与怒河全员守门牺牲；循鲨鱼手环定位找到羌青瓷、配合取芯片（暗中略松其绑绳）、葬羌于花丛。
      - 送蒋伯驾入警局、收其干净赏金与遗书、注射抑制剂换血治病。
      - 与程聿怀雨中和解（撑伞追回）。
      - 重返战地，以"土豆袋子里的记者"做最后一次直播殉职；用对讲机频道与蒋伯驾口是心非道别。
    对外台词:
      - "（认罪现场，执程走柳版剧本上台公布罪证、认罪）"
      - "（雨中追回程聿怀）程聿怀，我还是没原谅。……我只是觉得，我不能，再一次不知我同怀去向。"
      - "（结局《口是心非》小剧场，逐句念出）胡说，我的爱情，明明始于一见钟情。"
      - "（小剧场）我在意死了……既然这样，他去挽别人手臂就好了，别再来找我。"
      - "（小剧场结尾·真心话）蒋伯驾，我喜欢你。"
      - "（最后直播开场）嗨，这里是土豆袋子里的记者，程走柳。"
      - "（直播·对蒋伯驾）有一天，当帝国与侵略主义彻底消亡，爱便拥有这世界上唯一一块殖民地。三千年的冲突里，你是我永恒的平静。"
      - "（结局小剧场，对缪宏谟假声）缪宏谟，我的声音你装得还挺像嘛，其实，我更想说……我很想你。"
