# =====================================================================
# 程聿怀 · 逐幕任务 + 可对外台词脚本
# =====================================================================
# 来源：A 本(第1-4幕) / B 本(第5-6幕) / C 本(第7幕-结局)，男女版正文。
# variant：男女版仅在"对羌青瓷的描写/性别代词"不同；程聿怀自身任务与
#          台词两版一致。涉及羌青瓷性别的台词用 variant 备注（女程本→男羌"老公"，
#          男程本→女羌"老婆"，文本默认写"老公/夫妻"口径，按本反向匹配）。
# 台词字段 say：可对外/可对羌青瓷的脚本；ban：本幕禁忌(绝不可暴露)。
# extracted_by: opus
# =====================================================================

character: 程聿怀
variant_note: >
  发本规则=与羌青瓷性别反向匹配：女程聿怀本配男羌青瓷(略强势)，
  男程聿怀本配女羌青瓷(更温柔)。任务/台词正文两版一致。

global_constraints:
  - 【全局最高】记住不要暴露你就是"延迟"！！！也不要暴露与延迟相关的人和事——表面上你绝不认识阿奇。
  - 【全局】请对黛利拉绝对保密：阿奇是你的替身，且阿奇已死。永不在黛面前提起。
  - 请以记者程聿怀的身份跟大家交流。

acts:

  # ------------------------------------------------------------------
  - act: 第一幕
    场景: 金狮医院开业，与众人(走柳/蒋伯驾/缪宏谟/黛利拉/以撒)同被抓现场。
    你需要做到:
      - 记住不要暴露你就是"延迟"；不要暴露与延迟相关的人和事，表面上你绝不会认识阿奇。
      - 多关心妹妹程走柳；问清蒋伯驾与走柳之间暧昧又暗潮涌动的关系。
      - 在众人面前表演你和羌青瓷是恩爱夫妻；私下可尽情对他表达想说的话。
      - 作为旁观者完成与阿奇的约定：若阿奇引荐黛利拉，看着他说"你们真的很相配"(绝不让人察觉你认识阿奇)。
      - 尽量弄清在场每个人之间的关系。
    say:
      恩爱表演_私下台词:
        text: "(给羌青瓷倒一杯水喂他时，耳边悄声) 你还真喝呀？我下毒咯～"
        variant: { 女程本: 对男羌, 男程本: 对女羌 }
      对外婚姻口径: "我们大学校园相识相爱(按羌青瓷给的版本，再结合真实相识经历胡编)。"
    ban:
      - 绝不能说与羌青瓷闪婚是因为莱诺家族要和"延迟"联姻。
      - 绝不暴露认识阿奇。

  # ------------------------------------------------------------------
  - act: 第二幕
    场景: 给走柳准备生日礼物(荔枝苗结不出果)；用吐真剂套羌青瓷；以"延迟"身份与莱诺家族开会。
    你需要做到:
      - 准备好吐真剂、控制时间(药物+心理诱导最多控他约十分钟)。
      - 用茅根竹蔗水(中药味遮吐真剂)诱导羌青瓷喝下；趁其眼神涣散、扶头中招时问话。
      - 以"延迟"身份用阳谋在明面否决莱诺家族立刻引战的方案，反提"先暗杀诺族台长制造恐慌"。
      - 派黛利拉(而非自己手下)去刺杀台长，避免追查到"延迟"。
    say:
      诱羌青瓷喝水: "老公，是不是累了，喝点甜水，休息一会吧。"
      套话问题:
        - "当年 1994 年的莱诺新闻奖颁奖典礼上到底发生了什么？我父亲为什么会死在领奖台上？"
        - "1995 年莱诺家族出资建电台，到底有何目的？和之后的大屠杀有关吗？"
        - "(可选，趁机)羌青瓷对你现在几分利用、几分真心？"
      会议阳谋台词: "你们刚建金狮医院就发动战争，很容易被联系到一起……你们莱诺家族要这么急功近利吗？"
    note: 当羌青瓷眼神清醒、能正常对视时立即停问，以免打草惊蛇。
    ban: 隐藏自己就是"延迟"；隐藏知道莱诺家族抹黑父亲/将屠杀。

  # ------------------------------------------------------------------
  - act: 第三幕
    场景: 金狮医院械斗(奥丁救场)；唱片店"以故事换唱片"。
    你需要做到:
      - 继续从羌青瓷套话、稳住莱诺家族表面关系。
      - 配合羌青瓷介绍并体验火柴疗法；若羌恶意整你问不想答的问题，直接吹灭火柴。
      - 在唱片店分享父亲程亮冬的事迹(换唱片送奥丁)。
      - 隐藏延迟相关人事：隐藏阿奇以"延迟"身份救黛利拉、你让黛杀了诺族台长；隐藏你知道莱诺家族要大屠杀、抹黑父亲(此事暂不让走柳知道)。
    say:
      恩爱火柴疗法: "老公，你爱我吗？"
      关心走柳: "走柳，你为什么来布雷诺？"
      父亲事迹: >
        我和走柳原本一家五口，父母和舅舅都是文人。1994 年父亲获莱诺新闻奖，
        在布雷诺领奖台发言时全场光灭、话筒无声，寂静二十秒后他身中六枪死在现场，
        凶手至今未找到，他还被诬陷成"持凶伤人"的失范记者。我一直在找真相，
        立誓为父亲证明清白。
    ban: 隐藏你就是"延迟"；隐藏认识阿奇。

  # ------------------------------------------------------------------
  - act: 第四幕
    场景: 与伯纳德/卢特会议("金丝网"宣言)；圣女假新闻；走柳被软禁；战后火柴疗法。
    你需要做到:
      - 给伯纳德一个"合适但几乎无用"的挑火建议(从信仰/宗教下手)以维持其信任，但不真心推动屠杀。
      - 保护被软禁的走柳：派亲卫盯防，若伯纳德要伤她则强行带出。
      - 制造"延迟溃逃"假象、让伯纳德卖军火给诺族结束屠杀，以削弱布雷族、重建两族平衡。
      - 不参与/不干预金狮医院那场刻意避开妇孺的暴乱(疑非伯纳德所为，乐见其扰乱计划)。
      - 接受并完成战后心理治疗(再见羌青瓷)。
    say:
      给伯纳德建议: "(扫一眼茶水) A 社，不是最擅长编造世纪谎言？(用诺族之手毁布雷族信仰、造由头挑动愤怒)"
      止战说辞: "你们想多捉几次鱼，就不能把池塘的水都抽干，总要留一些水、一些鱼，之后才能继续。"
    ban: 隐藏身份；隐藏知道莱诺屠杀计划；对走柳暂隐父亲被害真相("会在后面保护好她")。

  # ------------------------------------------------------------------
  - act: 第五幕
    场景: 向走柳忏悔；帮羌青瓷夺家主位；阿奇质问留疤；海岛伊娃线/鲨鱼线。
    你需要做到:
      - 在走柳烫手自残时安抚、向她为"漠视和懈怠"道歉(但仍不敢承认自己就是延迟)。
      - 向伯纳德讨走柳血液病解药(未果，争取五年后给+让其远离走柳)。
      - 与羌青瓷达成"我助你夺家主位、你助我查父真相"的合作，以深掘莱诺信息、找弱点。
      - 接住阿奇带刀的质问：承诺莱诺家族覆灭后命随他取(留下脖颈长刀疤=承诺与提醒)。
      - 对黛利拉守住"阿奇已死"的秘密。
    say:
      对走柳忏悔: >
        走柳，我怎么会怪你……我只会憎恨伤害你的人、憎恨没保护好你的我自己。
        我为我所有的漠视和懈怠向你道歉。对不起，真的对不起。
      对阿奇承诺: "阿奇，我的命从来不值钱，但不能是现在，等莱诺家族覆灭之后，你随时可以拿走我的命。"
      鲨鱼安魂曲(对走柳): "我在听鲨鱼安魂曲。(活人的魂魄也会不安啊，妹妹。)"
    ban: 不敢/不可对走柳承认自己就是延迟；对黛守阿奇之死。

  # ------------------------------------------------------------------
  - act: 第六幕
    场景: 被绑仓库与众人同困、羌青瓷揭身份挑拨、奥丁救场结同盟；与走柳/蒋伯驾摊牌。
    你需要做到:
      - 在仓库无论发生何事，继续隐藏阿奇是你的替身且已死(重要)。
      - 与缪/蒋/黛/以撒结成"先推翻莱诺家族、私人恩怨后算"的复仇同盟。
      - 互通五年来各自证据，共商纪念会(2005/5/2)直播曝光计划。
      - 决意取出羌青瓷心脏芯片(因 B 本认定其背叛)。
      - 向走柳为隐瞒"延迟"身份道歉、约定一切结束后回江南大道的家。
    say:
      对走柳道歉: >
        走柳，首先为瞒了你这么多事向你道歉。作为延迟跟莱诺家族一起推动屠杀不是我本意——
        没有我他们也已有精密策划，但我需要参与进去才能获得信任、收集证据，有朝一日把证据拿出来。
        我们一直殊途同归：找父亲死亡真相、还他清白，还想为对方撑起一片天。等一切结束后，
        我们一起回江南大道的家吧，让我弥补这些年的缺席。
      对蒋伯驾(警告): "蒋伯驾，既然承诺要照顾好我妹妹，就别自己打自己的脸。(若让我知道你对不起走柳，我亲手杀了你。)"
    ban: 全场继续隐藏阿奇=你的替身且已死。

  # ------------------------------------------------------------------
  - act: 第七幕
    场景: 纪念会内圈当众曝光罪证；奥丁守门牺牲；找到羌青瓷取芯片致其死；查抄庄园读自写信。
    你需要做到:
      - 按计划在内圈把五年收集的莱诺家族罪证公之于众(认罪=死亡，但你们偏要为受害者杀出血路)。
      - 莱诺家族关键人物从暗门逃脱后，循鲨鱼手环定位找到羌青瓷安全屋。
      - 请心外科医生取出羌青瓷心脏芯片(明知取出=死)，把芯片插入电脑曝光万千证据。
      - 在查抄庄园时读完羌青瓷写给自己的一整柜信——得知他爱你十五年、沉默十年的全部真相。
    say:
      取芯片前: "没人要你的心，我们只是需要里面的芯片。"
      手术决断: "(医生问芯片取出会致瑞法死亡是否继续)(背过身，挥手) 继续。"
    note: 读信后情绪从"祝他得不到爱"转为剧烈自责("程聿怀，你真的选对了吗")。
    ban: 仍守阿奇秘密。

  # ------------------------------------------------------------------
  - act: 尾声·江南大道/自首
    场景: 回家为走柳道别剥荔枝；自首；放空名单威慑；行刑前夜黛利拉来取命。
    你需要做到:
      - 为走柳做最后一顿饭、剥七颗增城挂绿荔枝、送轻便指南针，平静告别后去自首。
      - 自首后放出"持有莱诺家族合作名单、已交给新'延迟'"的消息(名单实为空，纯威慑)，逼上位者收敛、让记者去查名流。
      - 让"延迟"成为不灭符号(全世界许多人自称'延迟'调查名流)。
      - 接受黛利拉的复仇之刀(沿阿奇旧痕)，向她讲述阿奇的生活、坦然受死。
    say:
      对走柳道别: "走柳，照顾好自己，好吗？……对不起，这么多年我总是自以为是执行自己的计划，却从没问过你一句：走柳，你要一起吗？我不是一个好同怀。"
      对走柳: "程走柳，我不回家能去哪？"
      对黛利拉讲阿奇:
        - "其实阿奇根本不像表面上善良，他经常勒索我……(讲他设计两层穹顶房子、偷偷调高工资、迷信雷诺曼卡牌只抽一张)"
        - "对不起啊黛利拉，没能让你们有更多相爱的时间。"
      探监威慑: "(对延迟你死期、来探名单的上位者，竖中指，大笑离场。)"
    note: 走柳最终撑伞追来"我还是没原谅，我只是不能再一次不知我同怀去向"——和解。
    ban: 始终守阿奇=替身且已死之秘密。
