# 《流氓叙事》以撒视角 · 人物关系（typed）
# 来源：A/B/C 分卷正文 + _profile.md；关系=以撒主观认知（化名/前后期认知变化标注）。
# type 取值：cp / 亲属 / 家人(非血缘) / 敌友 / 上下级 / 同伴 / 化名 / NPC关系
# 注：以撒不知道的上帝视角真相（如真延迟=程聿怀、阿奇替身、羌青瓷=瑞法身份等）按"以撒何时获知"标注，未知者不写为既知。

character: 以撒
aliases: [Jsaac, Isaac, 小以撒, 逃跑者以撒, 廖景恢（接近缪宏谟时的化名）]

relations:

  - name: 缪宏谟
    type: cp/恋人
    typed: [cp, 恋人, 救命恩人→报复对象→挚爱]
    summary: >
      我等待五年的女人。1995年她为我处理半脸伤口，教我'做蝴蝶——花留在原地，蝴蝶可以飞翔'，
      推开我看世界的窗。她'花开就回来'却失约，我曾以为她是骗子、把蝴蝶做成标本代偿占有欲。
      重逢后才知她摘了撒该角膜、嫁入莱诺家族，我恨过诅咒过；可她的爱终究教会我'爱是让对方自由'。
      '她的命只属于我'，最后我笑着扮凶手领死，把自由与活路还给她。
    cognition_shift: "占有欲（标本）→ 怨恨（被弃/摘角膜）→ 成全（自由）。"

  - name: 撒该
    type: 亲属/妹妹
    typed: [亲属, 妹妹, 诺族]
    summary: >
      我的亲妹妹，诺族人。1992年出生，像天使一样爱我，把所有好东西留给我，送我蛇'想笑就笑'
      （'想笑就笑'的名字是她起的）。她被程走柳的虚假新闻伪饰成'布雷族圣女'、双眼角膜被缪宏谟
      在伯纳德胁迫下摘下，最终被诺族难民因一张杂志封面活活打死，临死让我'别恨''去更大的世界'。
      她是命运对我的垂怜、我不敢奢求的救赎。

  - name: 祖母穆佳姆比
    type: 亲属/祖母
    typed: [亲属, 祖母]
    summary: >
      名叫穆佳姆比（布雷诺寓意'神明的选择'）。唯一不管不顾护我、坚信'我不是邪灵只是生病'的至亲；
      为治我的病四处奔波、摔下山洞瘸了腿，把纸钞叠成小方盾一次次塞我口袋。屠杀中她把刀刺进自己心脏、
      佯装我是刺死她的布雷族刽子手，用最后的生命骗过追兵、把生机留给我——祖母死在我手里。

  - name: 想笑就笑
    type: 家人/蛇
    typed: [家人(非血缘), 宠物/蛇, 生死同体]
    summary: >
      撒该救下、让我养的蛇，后来长成四米四十斤的蟒。蛇没有外耳听不到声音，所以我崩溃狂笑时它从不离开。
      撒该与祖母死后它是我唯一的家人，我邀它'生死同体'一起流浪。逃亡掩护时它把我一圈圈缠裹、
      用身体替我挡火焰爆炸焦化而死，只记住'生死同体'四个字。我最后对它说'下辈子，为自己而活吧'。

  - name: 奥丁
    type: 上下级/家人
    typed: [上下级, 家人(非血缘), 亦父亦友, NPC]
    summary: >
      狂草帮老大、怒河指挥官。白桦林里拉我一起跑、用《生来奔跑》和笑话接纳我，撮我的脸说
      '想笑就笑啊！在老大面前可以想笑就笑'，给我第一双跑鞋。他把笑话记进小本子、我是唯一捧场的人；
      重伤时我接手他的情报网。纪念会守门为我们全员牺牲，戴着没电的耳机踏上'无声之旅'——
      '你的自由，就是我的自由'。
    note: "结局才知奥丁送我的精良衣物腕表香水其实多由缪宏谟所送；'温蒂'是《生来奔跑》歌词，他没有这个女友。"

  - name: 黛利拉
    type: 同伴
    typed: [同伴, 狂草帮/怒河杀手]
    summary: >
      比我大一岁的狂草帮小杀手、'战争之子'，从小缺爱。教我打拳，曾因嫉妒我'拥有一份爱'而下狠手；
      后来我懂我们是一样被命运抛弃的可怜虫。怒河收官任务里她负责杀程走柳，我负责杀缪宏谟。
    note: "我只知她2003年'杀了延迟'，不知那是替身阿奇、也不知她患解离障碍/假阿奇（上帝视角，不入我的认知）。"

  - name: 伯纳德·莱诺
    type: 敌友/敌对
    typed: [敌对, 情敌, 莱诺家族第一继承人, NPC]
    summary: >
      缪宏谟的未婚夫，用订婚戒指束缚她、纠缠她；我给他反戴戒指'那你现在也是我未婚妻了'羞辱他。
      莱诺家族第一继承人，曾胁迫缪宏谟摘撒该角膜，后于2001年死于非命凶手成谜。

  - name: 程走柳
    type: 敌友（前期恨）
    typed: [敌对→盟友, 记者, 怒河幕后(后知)]
    summary: >
      （前期恨）我第一个相信的记者，却把撒该写成'布雷族圣女'害死她，我恨不得剥她筋骨。
      （第六幕才知）她与缪宏谟实为怒河真正的幕后创始人、对撒该之死抱有愧疚、把自己名字也放进暗杀名单。
    cognition_shift: "恩将仇报的'毒蛇' → 怒河幕后创始人/赎罪者（临时盟友）。"

  - name: 蒋伯驾
    type: 敌友→盟友
    typed: [旧识→盟友, 卧底(后知), 军火供给]
    summary: >
      初见是'缪宏谟身边戴金丝边眼镜、与她相熟'的男人。（第六幕才知）他是潜伏莱诺家族的卧底记者、
      金狮医院暴乱的发动者，救了诺族人也杀了人；后成同盟，给我们提供先进军火与最后一夜的小木屋安全屋。

  - name: 程聿怀
    type: 盟友（后知）
    typed: [盟友, 真'延迟'(后知)]
    summary: >
      （第六幕才知）他才是真正的'延迟'、布雷族军师、瑞法的人；与我们结成推翻莱诺家族的临时盟友。
    note: "此前我只知'延迟已被黛利拉所杀'，并不知延迟=程聿怀（也不知有替身阿奇）。"

  - name: 羌青瓷
    type: NPC关系/敌对
    typed: [敌对, 莱诺家主(后揭), DM主D, NPC]
    summary: >
      金狮医院院长、给我们做火柴疗法的心理医生。（第七幕由蒋伯驾揭破）即莱诺家族家主瑞法·莱诺本人、
      大屠杀幕后真凶之一。我们循其鲨鱼手环定位追到安全屋、取出其心脏芯片放出全部铁证，将其掩埋。
    note: "羌青瓷×程聿怀的'纯爱/十五年沉默'真相我并不知情（上帝视角，不入我的认知）。"

  - name: 保罗
    type: 家人（狂草帮）
    typed: [家人(非血缘), 狂草帮厨子, NPC]
    summary: "独臂厨子，被奥丁聘用；常使唤奥丁砍柴、学奥丁语气惟妙惟肖。地下室御敌时与我并肩。"

  - name: 阿杰
    type: 家人（狂草帮）
    typed: [家人(非血缘), 狂草帮配角, NPC]
    summary: "生性胆小，被奥丁留下照顾帮派老少；在奥丁鼓励下也敢握刀向前。"

  - name: 卢特·莱诺
    type: 刺杀目标
    typed: [刺杀目标, 莱诺家族成员, NPC]
    summary: "莱诺家族成员（瑞法的叔叔）；我在西国下水道追杀了他，发现其中指戴着莱诺家族订婚款戒指（与缪宏谟手上同款）。"

  - name: 巫者 / 布雷诺村民
    type: 仇敌（前史）
    typed: [仇敌, 施刑者, NPC群体]
    summary: >
      童年把我的狂笑症当'蛇灵'、滴蜡插石刀施刑、人人喊打的村民与巫者；我曾给骗子泼羊血、
      绑走巫者之子报复。第二幕那些当年施刑者在人群里谩骂我，被我和缪宏谟下了哑药。

meta_notes:
  - "以撒前期=占有/报复型'阴湿蛇男'，后期在缪宏谟的爱里学会'爱是让对方自由'，关系认知整体由'束缚'转向'成全'。"
  - "化名'廖景恢'仅用于第五幕接近并意图刺杀缪宏谟期间；与缪相认/立誓约后不再使用。"
  - "凡标注'(后知)/(后揭)'的关系真相，均为第六/七幕才进入以撒认知，序幕至第五幕不得预先知晓。"
