# 《流氓叙事》逐幕任务 + 可对外台词脚本 · 以撒
# 来源：A/B/C 分卷正文【你需要做到——】任务页 + 正文加粗台词抽取。
# 用法：tasks=该幕主观必达目标；lines=可直接对外说的台词脚本（""内为原文/拟真台词）。
# 化名：重逢缪宏谟时自称「廖景恢」。标志台词："在你的视线之外，我一直在""我说三句话，两句假一句真"。

character: 以撒

acts:

  序幕:
    setting: "认罪现场，第三位发言。"
    tasks:
      - "作为第三位发言者上台，公开自己的'罪状'。"
    lines:
      - "（认罪）我爱慕一位有夫之妇，并杀了这位有夫之妇的许多亲、朋、好、友——我也是为了爱情嘛。"

  第一幕:
    setting: "狂草帮砸金狮医院，以撒拦黛利拉投向缪宏谟的石头被一并抓住，外国人围拢。"
    tasks:
      - "和黛利拉被抓，不管如何，你们是狂草帮的人，不要轻易暴露奥丁和此行的目的。"
      - "如果缪宏谟误会你砸了她的窗户，要解释清楚：你是为了保护她（拦黛利拉的石头）才被抓。"
      - "了解在场人的身份，尤其那些外国佬，危险提前预防、人心仔细看清。"
      - "弄清每个人之间的关系，特别是站在缪宏谟身边那个（戴金丝眼镜的）男人是谁，他们看起来很相熟。"
    lines:
      - "（向缪宏谟解释）不是我砸的窗——我是看见有人拿石头瞄准你，冲过去拦才被按住的。"
      - "（山体滑坡救她、立誓约游戏）我现在说三句话，里面有两句是假的，一句真的。你能答对哪句是真的，我就救你。"
      - "第一句，它一个月没有进食过了。"
      - "第二句，我目前还没有救你的打算。"
      - "——好久不见，缪宏谟。"
      - "（介绍蛇）我说，它的名字，叫想笑就笑。"
      - "（她以为会被丢下）我不是你。"

  第二幕:
    setting: "缪宏谟当众护以撒、带他回出租屋疗伤；以撒试探能否被接受真实的自己；火柴疗法诊疗室。"
    tasks:
      - "向缪宏谟递出'看到真实的我'的入场券，试探她能否接受真实、阴暗的你。"
      - "（策略）让她心疼=让她心动：主动走进当年向你施刑者的人群，引他们谩骂，让缪宏谟听见、为你而来。"
      - "与缪宏谟互撕面具、共同报复（给谩骂者下哑药）。"
      - "（火柴疗法）有疑问就说自己需要帮助；听羌青瓷介绍火柴疗法并配合；不想回答的问题，把火柴直接吹灭。"
      - "（借火柴疗法发问）直接问缪宏谟'那天你到底为什么吻我？''为什么一边和我搞暧昧，一边又和别人订婚？'；问奥丁'你当时为什么要拉着我一起跑步呢？'"
    lines:
      - "（递入场券）如果，他们口中的我，就是真的我呢？……缪宏谟，你要进来看看吗？"
      - "（坦白真实的自己）阴狠、恶毒、报复心很强、会泼血诅咒那些伤害我的人。"
      - "（报复构想）我想把他们绑过来，一个一个在他们的嘴巴里，塞满玻璃渣。"
      - "缪宏谟，你说这些话的时候，很美。"
      - "（火柴疗法发问·缪）那天你到底为什么吻我？为什么一边和我搞暧昧，一边又和别人订婚？"
      - "（火柴疗法发问·奥丁）奥丁，你当时为什么要拉着我一起跑步呢？"

  第三幕:
    setting: "停车场撞见伯纳德纠缠缪宏谟；金狮医院地下室械斗御敌；唱片店以故事换唱片。"
    tasks:
      - "护缪宏谟、拆穿伯纳德'有夫之妇'之说（把准备送缪的银戒反戴给伯纳德）。"
      - "阻止缪宏谟自伤式摘戒，把'自由戒指'放进她掌心、把选择权还给她。"
      - "接受缪宏谟亲手为你戴上的银唇钉（定情）。"
      - "与狂草帮在金狮医院地下室并肩御敌、保护医护与病人。"
      - "（唱片店）分享你从小的遭遇：因狂笑症被当蛇灵、唯祖母在乎你、撒该出生并送你'想笑就笑'，以此换一张摇滚唱片送奥丁。"
    lines:
      - "（护缪）她有名字，她叫缪宏谟。"
      - "没有结婚，算什么有夫之妇？"
      - "（反戴戒指给伯纳德）那你现在也是我未婚妻了，伯纳德先生。"
      - "（阻止摘戒）缪宏谟，这只是一个铁环而已。这些东西，没有差别，你不赋予它含义，它就什么都不是。"
      - "（野花自由戒指）戒指可以有很多其他含义，这个野花戒指的意义：缪宏谟，你是自由的。只要你不认，任何人、任何东西都不能束缚你。"
      - "（她问从哪出现）你的视线之外。在她的视线之外，你一直在。"
      - "（沙漠帐篷·深渊蝴蝶）缪宏谟，你好像也很会爱人。"
      - "（唱片店换唱片，自述遭遇梗概）我有狂笑症，从小被当成身体里有蛇灵的怪物；只有祖母在乎我，相信我只是生病了。后来妹妹撒该出生，她像天使一样，把所有好东西都留给我；她送我一条蛇，叫'想笑就笑'——不要害怕笑，想笑就笑。祖母、妹妹、'想笑就笑'，就是我前十八年全部的世界。"

  第四幕:
    setting: "免费体检、撒该失踪、5月2日金狮医院屠杀、教堂诬陷、祖母之死、战后心理治疗。"
    tasks:
      - "察觉布雷诺氛围紧绷，慎护撒该与年迈的祖母，不带她们去免费体检。"
      - "探查金狮医院后门货车与失踪女童之谜（粉色老虎小女鞋）。"
      - "屠杀中找回失明披白大褂的撒该、再冲火场找缪宏谟。"
      - "护撒该逃出医院、在难民教堂为她抵挡'布雷族奸细'的诬陷：发毒誓证明她是你亲妹妹、是诺族人。"
      - "撒该死后，用'想笑就笑'的毒报复害她的诺族人；找到并背负祖母，目送她以命换你生机。"
      - "（战后心理治疗）聆听故事，见证罪恶。"
    lines:
      - "（找回撒该）是哥哥……撒该。别怕，是哥哥……撒该……对不起，哥哥来晚了。"
      - "（离开她去找缪）撒该，等我回来。哥哥一定会回来找你，我保证。"
      - "（教堂护妹·发毒誓正名）她是我的亲生妹妹，是诺族人！你们好好看看我们的脸，这是血缘才会有的相似——这是撒该唯一的身份证明。"
      - "（撒该死后对'想笑就笑'）吐吧。吐出来我们所有的恨，有毒的恨，鲜红的恨，还给他们。"
      - "（送别祖母）祖母……我记得，你叫穆佳姆比，寓意神明的选择。"

  第五幕:
    setting: "邀蛇流浪、加入怒河、刺杀莱诺成员、自学东国语、化名应聘缪宏谟助手、被绑入仓库。"
    tasks:
      - "邀'想笑就笑'与你'生死同体'一起流浪；接受奥丁邀请加入怒河、成为王牌杀手与情报官。"
      - "在奥丁指挥下完成对'延迟'替身、卢特·莱诺等莱诺成员的刺杀；陪护重伤的奥丁、接手情报网。"
      - "自学东国语、潜回缪宏谟出租屋读她留下的书，为有朝一日当面质问她做准备。"
      - "以化名'廖景恢'、翻译配音双专业学生身份应聘缪宏谟助手，一步步获得碰触权、伺机杀她（却一再'再等等'）。"
      - "得知瑞法继任家主要重演骗局，明确'推翻整个莱诺家族'的新目标。"
    lines:
      - "（邀蛇流浪）我什么都没有了，你知道吗？……要么别管我了，要么……跟我一起流浪吧。我们生死同体。"
      - "（拒绝与黛利拉换目标）我会亲自处理她。"
      - "（化名·写字给缪宏谟看）廖景恢。景色的景、恢复的恢。"
      - "（重逢搭话）需要帮助吗？……第一次当导盲犬，业务有些不熟练。"
      - "（请求碰触权）抓我的手臂，可以吗？"
      - "（量体）这样测的话，我可能会碰到你的腿，可以吗？"

  第六幕:
    setting: "真相揭晓、临时同盟、立誓约、村落围攻、沙漠夜车、安全屋最后一夜。"
    tasks:
      - "消化真相：延迟=程聿怀、暴乱发动者=蒋伯驾、怒河幕后=缪宏谟与程走柳、芯片在瑞法心脏。"
      - "与众人结临时同盟：先推翻莱诺家族，私人恩怨（缪宏谟的命只属于我）日后再算。"
      - "逼缪宏谟立'只能由我杀你、再给我一场爱情'的誓约；为她取回母亲尸骨、剥山竹喂她吃面。"
      - "护缪宏谟穿过受难者村落的围攻（弄蛇粉操蛇驱散村民）。"
      - "沙漠夜车：让盲人缪宏谟开车、玩十米默数重逢游戏，向她道歉、坦白曾经的恨与爱。"
      - "回安全屋（蒋伯驾的小木屋）取出三枚戒指，问她几个问题、要她明确'活下去'的回答。"
    lines:
      - "（立誓约）发毒誓，只能由我杀死你。死前不许逃避，再给我一场爱情。"
      - "（纠正'有夫之妇'）伯纳德先生已经与世长辞，您现在是一位寡妇。"
      - "（要她吃饭）吃一碗面。面里再加一颗蛋。"
      - "（村落顶撞后）在你的视线之外，我会一直看着你。别想再一次欺骗我。"
      - "（沙漠道歉）对不起。我不知道没有眼睛的生活，原来这么难，连我这样的人都会摔跤。"
      - "（坦白爱恨）何止恨过，缪宏谟，我曾诅咒你……但我唇钉是你给的，护腕是你缠的，伤疤是你缝的，书籍是你赠的，看见世界的窗户，也是你推开的。你要我怎么恨你。"
      - "（要她活）从现在起，不要给我，你放弃生命和转机的任何暗示……你什么都不需要做，你只要存在。"
      - "（三戒之·花）这一次，我想给你一枚永不凋零的花戒……这枚花朵戒指的含义，是我希望你珍惜现有的生命。你愿意收下吗？"
      - "（三戒之·羽毛）我们共有的那一部分叫翏，是新羽高飞的意思……这枚羽毛戒指的含义，是天地宽阔，我希望你自由。你愿意收下吗？"
      - "（三戒之·蝴蝶）这枚蝴蝶戒指的含义，是往前飞、向前走。你愿意收下吗？"
      - "（收束）缪宏谟，你的人生从来不属于我，但我仍然希望，你的人生里有我，这样可以吗？"
      - "（对奥丁）奥丁，等一切结束，我们去荒原放肆奔跑，你带着温蒂，我们所有人再去一次唱片行，听你再唱一次摇滚乐。"

  第七幕:
    setting: "莱诺家族五周年纪念会现场，同心圆建筑；内场认罪、回廊守门、追剖瑞法取芯片。"
    tasks:
      - "（计划）拿到缪宏谟盲杖拆出的枪后不可轻举妄动；在内场负责解决隐藏的持枪者。"
      - "配合黛利拉狙击安保、众人公布五年罪证，把莱诺家族钉死六大罪。"
      - "承受回廊上奥丁与怒河全员的牺牲（守门受控燃烧）、听完奥丁《无声之旅》。"
      - "循瑞法鲨鱼手环定位追到安全屋、取出心脏芯片放出全部铁证、掩埋瑞法。"
    lines:
      - "（认罪现场台词以 C-第七幕-02『认罪现场·以撒版』剧本为准；与众人一桩桩认下罪行，自污自焚以钉死莱诺家族六大罪。）"
      - "（呼唤奥丁）奥丁！"

  结局:
    setting: "断后掩护、想笑就笑护主而死、逃亡北国看蝴蝶迁徙、山巅胁持戏领死、死亡之界重逢、尾声小剧场。"
    tasks:
      - "独自开车断后掩护众人撤离，看着'想笑就笑'以身护我焦化而死、留下花瓣大小未烧焦的鳞片。"
      - "带缪宏谟逃亡去北国冷杉林看蝴蝶迁徙；向她说出'我爱你'。"
      - "写好模仿她语气的举报信、设计'胁持人质'戏让缪宏谟脱罪减刑，我独自笑着领死。"
      - "在死亡之界与奥丁/怒河、撒该、祖母、'想笑就笑'重逢；放飞光与暗交界处的蝴蝶——爱是放她自由。"
      - "（结局小剧场）为缪宏谟戴上鲜花/羽毛/蝴蝶三枚戒指：'花重新开了，蝴蝶也回来了''我爱你'。"
    lines:
      - "（送别想笑就笑）走吧。以后，你不用一条蛇在房子里等我好几个月了……你自由了。想笑就笑，下辈子，为自己而活吧。"
      - "（说爱）缪宏谟，我自出生起，一直是一个被诅咒的生命……但你的出现，让我觉得它们都是有意义的。缪宏谟，我爱你。"
      - "（山巅胁持戏·重逢游戏）接下来，我会说三句话，有两句假话，一句真话。如果你猜对了，我就想办法留下。"
      - "第一句，它一个月没有进食过了。"
      - "第二句，我目前还没有救你的打算。"
      - "（耳语第三句）缪宏谟，又要好久不见了，别忘了我。——好久不见，缪宏谟。"
      - "（纠正她）错了。不会好久不见……即使蝴蝶不再来也没关系，重要的是——蝴蝶来过。"
      - "（摘戒释放·小剧场前）所以，缪宏谟，我想结束这场以爱为名的束缚。缪宏谟，你自由了。"
      - "（结局小剧场·三戒）第一枚是鲜花戒指……第二枚是羽毛戒指……第三枚是蝴蝶戒指——缪宏谟，花重新开了，蝴蝶也回来了。"
      - "（谢幕）缪宏谟，在这个结局里，我爱你，在真正的现实里，我一样爱你。"
