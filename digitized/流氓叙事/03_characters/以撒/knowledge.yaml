    reveal_if: "第一幕被抓后【任务明令】不轻易暴露奥丁与此行目的；可对缪宏谟解释'砸窗是为保护你'。盟友关系确立后逐步松动。"
  - fact: F163/F-怒河杀手
    statement: "我是怒河的王牌杀手与情报官，受命刺杀莱诺家族成员（与名单上的程走柳、缪宏谟）。"
    hide_from: [缪宏谟, all]
    reveal_if: "前期对缪宏谟死守（以'廖景恢'助手身份接近）；第六幕真相共享后对盟友揭开。"
  - fact: F-化名廖景恢
    statement: "我以化名'廖景恢'、翻译配音学生身份接近缪宏谟，真实目的是杀她。"
    hide_from: [缪宏谟]
    reveal_if: "重逢初期死守（绑走导盲犬、堵盲道制造偶遇）；与缪宏谟相认/立誓约后不再隐瞒。"
  - fact: F-撒该是妹妹
    statement: "被伪饰成'布雷族圣女'的诺族小女孩，其实是我的亲妹妹撒该；她的眼角膜被缪宏谟在伯纳德胁迫下摘下。"
    hide_from: [难民群众, 布雷族, all]
    reveal_if: "教堂难民诬撒该为奸细时我曾发毒誓为她正名、出示身份证；屠杀语境下对陌生人群高度危险，按需对盟友吐露。"
  - fact: F-诺族身份
    statement: "我是诺族人（而非布雷族）。"
    hide_from: [布雷族屠杀者]
    reveal_if: "祖母用命替我演了'布雷族受害者'、狂笑症又骗过追兵，屠杀期对布雷族刽子手必须隐瞒；安全语境无需隐藏。"
  - fact: F-举报信
    statement: "我偷偷写好了一封模仿缪宏谟语气的举报信、并设计'胁持人质'让她脱罪减刑、我独自领死。"
    hide_from: [缪宏谟]
    reveal_if: "永不当面告知她全部真相；山巅胁持戏中以'三句话两假一真'游戏暗示，让教我写举报信的警察替我捂住她的嘴。"

# ============================================================
# goals_by_act{}：逐幕主观目标（详细任务台词见 goals.yaml）
# ============================================================
goals_by_act:
  第一幕:
    - "被抓后不轻易暴露奥丁与狂草帮此行目的（砸金狮医院/赶外国佬）"
    - "若缪宏谟误会我砸她的窗户，解释清楚我是为保护她（拦黛利拉的石头）才被抓"
    - "了解在场人尤其那些外国佬的身份，提前预防危险、看清人心"
    - "弄清众人之间的关系，特别是站在缪宏谟身边那个戴金丝眼镜的男人是谁"
  第二幕:
    - "向缪宏谟试探、递出'看到真实的我'的入场券，试探她能否接受真实的我"
    - "用'让她心疼=让她心动'的策略，主动走进谩骂人群、捕猎她的温柔"
    - "与缪宏谟互相撕下面具、共同报复（给谩骂者下哑药）"
    - "配合羌青瓷的火柴疗法，借机问缪宏谟'那天为什么吻我''为什么一边暧昧一边订婚'、问奥丁'当时为什么拉着我跑'；不想答的问题吹灭火柴"
  第三幕:
    - "护缪宏谟、拆穿伯纳德'有夫之妇'之说（给伯纳德反戴戒指）"
    - "阻止缪宏谟自伤式摘戒，把'自由戒指'放进她掌心、把选择权还给她"
    - "接受缪宏谟亲手戴上的唇钉（定情）"
    - "与狂草帮在金狮医院地下室并肩御敌、保护医护"
    - "唱片店用'我从小的遭遇'换一张摇滚唱片送奥丁"
  第四幕:
    - "察觉布雷诺氛围紧绷，慎护撒该与祖母、不带她们去免费体检"
    - "探查金狮医院后门货车与失踪女童之谜"
    - "5月2日屠杀中找回失明的撒该、再冲火场找缪宏谟"
    - "护撒该逃出医院、在教堂为她抵挡诬陷（发毒誓证明她是我妹妹、诺族人）"
    - "撒该死后报复害她的诺族人；找回并背负祖母、目送她以命换我生机"
    - "战后心理治疗：聆听故事、见证罪恶"
  第五幕:
    - "邀'想笑就笑'与我'生死同体'一起流浪；加入怒河、成为王牌杀手与情报官"
    - "完成对卢特·莱诺等莱诺成员的刺杀；陪护重伤的奥丁"
    - "自学东国语、潜回缪宏谟出租屋读她的书，为有朝一日当面质问她做准备"
    - "以'廖景恢'身份应聘缪宏谟助手、一步步获得碰触权，伺机杀她（却一再'再等等'）"
    - "得知瑞法继任家主要重演骗局，明确'推翻整个莱诺家族'的新目标"
  第六幕:
    - "消化真相：延迟=程聿怀、暴乱发动者=蒋伯驾、怒河幕后=缪宏谟与程走柳、芯片在瑞法心脏"
    - "与众人结临时同盟：先推翻莱诺家族，私人恩怨（缪宏谟的命只属于我）日后再算"
    - "逼缪宏谟立'只能由我杀你、再给我一场爱情'的誓约；为她取回母亲尸骨"
    - "护缪宏谟穿过受难者村落的围攻（用弄蛇粉操纵蛇群驱散村民）"
    - "沙漠夜车：让盲人缪宏谟开车、十米默数重逢游戏，向她道歉、坦白曾经的恨与爱"
    - "回安全屋（蒋伯驾的小木屋）取出三枚戒指，问她几个问题、要她明确'活下去'的回答"
  第七幕:
    - "在内场负责解决隐藏持枪者，配合黛利拉狙击安保、众人公布罪证"
    - "把莱诺家族钉死六大罪、看人群起立为我们鼓掌"
    - "面对回廊上奥丁与怒河全员的牺牲、听完奥丁《无声之旅》"
    - "循瑞法鲨鱼手环定位追到安全屋、取出心脏芯片放出全部铁证、掩埋瑞法"
  结局:
    - "独自掩护断后、看着'想笑就笑'以命护我焦化而死"
    - "带缪宏谟逃亡去北国冷杉林看蝴蝶迁徙；向她说出'我爱你'"
    - "写好举报信、设计'胁持人质'戏让缪宏谟脱罪减刑，我独自笑着领死"
    - "在死亡之界与奥丁/怒河、撒该、祖母、想笑就笑重逢；把光与暗交界处的蝴蝶放飞——'爱是放她自由'"
    - "（结局小剧场）为缪宏谟戴上鲜花/羽毛/蝴蝶三枚戒指：'花重新开了，蝴蝶也回来了''我爱你'"

