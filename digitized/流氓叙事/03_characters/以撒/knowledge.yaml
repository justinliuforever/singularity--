# ============================================================
# relationship_beliefs：以撒视角的人物关系信念（详 relations.yaml）
# ============================================================
relationship_beliefs:
  缪宏谟: "cp/我等待五年的女人；她教我'做蝴蝶'、推开我看世界的窗，她的爱教会我'爱是让对方自由'。她摘了撒该角膜、骗过我的感情，我恨过、诅咒过，却仍要她活着、自由——'她的命只属于我'，最后我笑着领死把自由还给她。"
  撒该: "妹妹/命运对我的垂怜；像天使一样爱我、送我'想笑就笑'、为我填二十四页弄蛇学院资料；被诬成布雷族圣女、被诺族人活活打死，临死让我'别恨''去更大的世界'。我永远的痛与救赎。"
  祖母穆佳姆比: "唯一不管不顾护我、信我'不是邪灵只是生病'的至亲；为治我的病摔瘸腿、把纸钞叠成小方盾塞我口袋，最后把刀刺进自己心脏、佯装被我所杀，把生机留给我。"
  想笑就笑: "撒该送我的蛇、我'生死同体'的家人；它听不见却从不因我狂笑离开，最后用身体替我挡火焰焦化而死，只记住'生死同体'四个字。我教它'下辈子为自己而活'。"
  奥丁: "狂草帮老大/怒河指挥官、亦父亦友；白桦林里拉我一起跑、用《生来奔跑》和笑话接纳我、撮我脸让我'想笑就笑'、给我第一双跑鞋。守门为我们全员牺牲，'你的自由就是我的自由'。"
  黛利拉: "狂草帮/怒河同伴、'战争之子'；教我打拳、曾嫉妒我'拥有一份爱'而下狠手，后来我懂我们是一样被命运抛弃的可怜虫。她负责杀程走柳，我杀缪宏谟。"
  伯纳德·莱诺: "缪宏谟的未婚夫/敌人；用戒指束缚她、纠缠她，我给他反戴戒指羞辱他。莱诺家族第一继承人，后死于非命。"
  程走柳: "（前期恨）伪装成记者、把撒该写成圣女害死她的'毒蛇'，我恨不得剥她筋骨——（第六幕才知）她与缪宏谟实为怒河幕后创始人、对撒该之死抱愧。"
  蒋伯驾: "缪宏谟身边戴金丝眼镜的男人/旧识；（第六幕才知）是潜伏莱诺的卧底、金狮医院暴乱发动者，救了诺族人也杀了人；后为同盟、给我们提供军火与安全屋。"
  程聿怀: "（第六幕才知）真正的'延迟'、布雷族军师、瑞法的人；与莱诺家族复仇的临时盟友。"
  羌青瓷/瑞法·莱诺: "金狮医院院长、火柴疗法的心理医生——（第七幕揭破）即莱诺家族家主瑞法·莱诺本人，大屠杀幕后真凶之一；我们取其心脏芯片、将其掩埋。"
  保罗/阿杰: "狂草帮的家人；独臂厨子保罗、胆小却被奥丁留下照顾老少的阿杰，地下室御敌时与我并肩。"
