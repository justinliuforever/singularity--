# 《流氓叙事》逐幕任务与对外台词脚本 · 蒋伯驾
# 来源：A/B/C 分卷正文【你需要做到——】任务块 + 正文可外化台词抽取。
# 用法：tasks = 该幕该角色须达成的目标；lines = 可直接对外说出的台词脚本（出处标注于注释）。

character: 蒋伯驾

acts:

  - act: 序幕
    scene: 认罪现场（第一位发言）
    tasks:
      - "作为第一位发言者，自认杀死了自己的父亲（那个曾把他当活靶子的人）"
    lines:
      - "（认罪）我杀死了我的父亲——那个把我当活靶子的人。"   # C-序幕-01 / F001-F002

  - act: 第一幕
    scene: 金狮医院开业·与程走柳尴尬重逢
    tasks:
      - "弄清两个破坏者是谁、医院被砸背后的组织者是谁（涉军火库安全）"
      - "【重要】隐瞒'肖须言与我秘密合作'；但'认识肖须言'不必隐藏"
      - "不提缪家与莱诺家族合谋发战争财、不提这次派我来的目的"
      - "弄清场上众人之间的关系"
      - "心中从未放下程走柳，想补办一场老派约会，正式给她一张约会卡（先走第一家甜品店：啤酒+黄油多士）"
    props_wanted: ["一罐啤酒", "一份黄油多士（可托肖须言弄来）"]
    lines:
      - "（自报家门/掩护身份）我叫蒋伯驾，是货真价实的缪家人。"   # A本开篇
      - "（被问来意，可承认认识肖须言，但不暴露合作）肖须言？我认识他，老相识了。"   # 任务2口径

  - act: 第二幕
    scene: 卢特府·程走柳订婚·火柴疗法诊疗室
    tasks:
      - "设法被卢特收为东国义子、住进其府邸，打入莱诺核心（肖须言出的主意）"
      - "在'小妈'程走柳订婚日翻窗进她房间送生辰礼（黑色手工相机带），约她回'老频道'"
      - "替缪宏谟向羌青瓷打听解除她与伯纳德婚约的办法"
      - "若羌青瓷问来意，就说'有疑问需要帮助'；听她介绍火柴疗法并配合；不想答的问题可直接吹灭火柴"
    lines:
      - "小妈好啊。"   # A本，浴室调侃程走柳
      - "你以前叫我蒋生，这么快，就变成了蒋先生？"   # A本
      - "程走柳，你真觉得你美若天仙，卢特见你一面就神魂颠倒？这么短时间，就要跟你结婚？你脑子呢？"   # A本
      - "你就不怕掉进陷阱里，摔死你？"   # A本
      - "哦，对了，你想要个孩子，我可以给你孩子，也可以当你的孩子。"   # A本
      - "生辰快乐。"   # A本，衣柜内补过生日
      - "什么时候回心转意了，我在老频道等你。"   # A本
      - "（对羌青瓷，火柴疗法）我有疑问需要帮助。"   # 第二幕任务1
      - "小妈，我是哪里不如卢特？"   # 第二幕火柴疗法指定提问
      - "有什么办法，可以解除我妹妹和伯纳德婚约？"   # 第二幕火柴疗法指定提问

  - act: 第三幕
    scene: 布雷诺械斗·金狮医院地下室·唱片店老派约会线
    tasks:
      - "护程走柳穿过金狮医院械斗、全程警戒她安全"
      - "与奥丁/狂草帮并肩御敌，在奥丁引导下学会'喊疼'"
      - "敲定'受控燃烧'：杀一批诺族官员以警醒诺族上层、促其与民众出逃"
      - "出门找羌青瓷，告知受控燃烧计划，求一个聚拢诺族官员的地点与方式"
      - "分享被缪家当活靶子的经历但【隐瞒缪家军火生意】；向走柳读最后一个路口约会卡、送馥芮白"
    lines:
      - "记得还，这领带一万三。"   # A本，给走柳擦镜头后
      - "（拿过走柳的刀）拍你的素材。能照顾好自己吗？"   # A本，地下室
      - "（被奥丁逼问是否疼，终于承认）疼。"   # A本，金狮医院地下室
      - "（自述身世·隐去军火）我虽是缪家人，自小却不被认可；十七岁生日那天，被亲生父亲当成活靶子，逃出生天回家，连一句'生辰快乐'都没得到。那一天台风'贝姬'过境，我遇到了程走柳，她那句萍水相逢的'生辰快乐'，我记了很多年。"   # 第三幕任务1
      - "（向羌青瓷求助）我需要一个能把诺族官员聚到一起的地方，和一个合理的方式。"   # 第三幕任务4

  - act: 第四幕
    scene: 雇佣兵屠杀·肖须言之死·圣女之死·战后心理治疗
    tasks:
      - "与羌青瓷敲定分批体检扣留诺族官员；通过暗网雇佣兵执行屠杀（操布雷族口音、不杀妇孺）"
      - "见证受控燃烧奏效、五万诺族人提前出逃"
      - "承受被伯纳德带去肖须言安全屋、被逼以绳勒死肖须言（作投诚礼）的剧变"
      - "战后心理治疗：聆听故事、见证罪恶"
    lines:
      - "（对肖须言被诬，强忍）……"   # A本：此处蒋伯驾近乎失语，内心独白为主，无对外辩白台词
      - "（事后葬肖须言）肖须言，我陪你等等朝阳。"   # A本，私下独白式告别

  - act: 第五幕
    scene: 黎挽南假死·反杀缪元俨·与走柳重逢·东南亚军火交易
    tasks:
      - "带黎挽南赴西国，与宏谟做'反目'戏、制造黎挽南假死，斩断缪元俨威胁宏谟的把柄"
      - "用相熟军阀为助力反杀缪元俨，篡改遗嘱接掌缪家成为'蒋先生'"
      - "对宏谟坦白缪家军火真相；与重逢的走柳维持'柜式情人'暧昧、让她在身边搜证"
      - "东南亚军火交易：故意促其失败，跳鳄鱼池救走柳、深林木屋肉搏脱身"
    lines:
      - "（对宏谟做戏）宏谟，黎女士刚来，人生地不熟，你多花时间陪陪她吧。莱诺先生的遗产，转到你名下流程很费时间……别让这种事情占据你们的时间了吧。"   # B本，假反目
      - "你的柳叶刀依旧吗？"   # B本，对宏谟的真心话
      - "（制住缪元俨后）爸，你的信息有点太过滞后了吧？……黎挽南没有死。"   # B本
      - "你说你们这些高高在上的男人怎么都这么傲慢呢？当然不包括我了，我是出身卑微如蝼蚁的男人。"   # B本
      - "我母亲是自杀的，她是自己拔掉的氧气管……'没有一个母亲，愿意成为子女的拖累''她只是一个纸飞机，不要带着她前行'。"   # B本
      - "母亲教我明义，黎女士教我识理、宏谟教我助人、程走柳教我懂爱。我受的每一份教育，没有一点是你的功劳。但没关系，我被教得很好。"   # B本
      - "（对走柳·柜式情人）在您这，我是收纳柜深处的情人，您想起来了，就拿出来用用……柜到一级，就是藏品。"   # B本
      - "（鳄鱼池救人后）程走柳，出事了不知道大声喊吗？你哑了？"   # B本
      - "在鳄鱼池寻我，程走柳，你可真看得起我。"   # B本
      - "下次你想要什么，能不能先问问我？你不问，怎么知道，我不给呢？"   # B本，木屋疗伤
      - "程走柳，记得吗？不要悔恨那些你无法左右的事情。这是你教我的。"   # B本，木屋安抚

  - act: 第六幕
    scene: 真相揭晓·营救黎挽南·荧光海摊牌复合·肖须言安全屋
    tasks:
      - "消化'延迟=程聿怀''怒河=宏谟与走柳''芯片在瑞法心脏'等真相，与众人结成临时同盟（先推翻莱诺、私怨日后再算）"
      - "带宏谟营救被囚的黎挽南；送她最后一程、接过她的红色录音笔铁证"
      - "荧光海摊牌：向走柳坦白杀肖须言、领受她那一枪、复合（咬破嘴唇求同病）"
      - "回肖须言安全屋过最后一夜，道歉、安慰宏谟、回应奥丁第二次入帮邀请"
    lines:
      - "（劝黎挽南，急到直呼全名）黎挽南，你不能这样……我们不想让你是这样的结局！"   # B本，停尸房
      - "（与宏谟同念贺词）祝来日自由时，柳叶刀依旧。"   # B本
      - "（荧光海）程走柳，自我们相识以来，我们有太多误会……如果有什么地方不能逃，那就是大海中央。"   # B本
      - "我在给你曾经一环一环的算计做毕业点评和批语……你要玩我，就玩我一辈子。但你给我的美好与欺骗对等，所以我心甘情愿。"   # B本
      - "（递枪给走柳）你是战地记者，开枪不用我教你。来。"   # B本
      - "程走柳，我一直觉得，我的一切罪恶，只能由你来结束。所以，你今天能开这一枪，我很高兴。"   # B本
      - "可我还有更疯的。"   # B本，吻她前
      - "（向聿怀宣告负责）她是我暗室逢灯的际遇、绝渡逢舟的功德。"   # B本
      - "这种血液病单次感染率不足2%，我现在还没有感染。既然这个世上没有真正的感同，那我就身受。"   # B本
      - "（向走柳/聿怀道歉）肖须言对我来说，亦师亦友，不管是什么原因，都是我杀了他，我很抱歉。在推翻莱诺家族以后，我会主动迎接应有的惩罚。"   # B本第六幕心里话(1)
      - "（对宏谟）从前，黎女士教会我，温柔的力量会更强大……没能给黎女士的自由，哥哥一定会给你。"   # B本第六幕心里话(3)
      - "（回应奥丁，脱口而出）或许吧。"   # B本，承认若生在布雷诺会加入狂草帮

  - act: 第七幕
    scene: 莱诺家族五周年纪念会·当众认罪·剖瑞法取芯片
    tasks:
      - "作为缪家家主第一个上台致辞，当众公开缪家与莱诺家族的军火生意、自爆卧底记者身份"
      - "与众人把五年罪证公之于众、把莱诺家族钉死六大罪（种族灭绝/虚假新闻/医疗/谋杀/战争/非法贩武）"
      - "守门的奥丁与怒河全员牺牲，哀悼并铭记"
      - "循鲨鱼手环定位找到瑞法、取出心脏芯片、放出全部铁证；掩埋瑞法"
    lines:
      - "（致辞，自爆）我是潜伏莱诺家族多年的卧底记者；缪家表面医疗器械，实则与莱诺家族合谋贩卖军火、挑起战争发横财。"   # C-第七幕-08 致词要点
      - "（看地图顿悟）你们不觉得，这个内圆与外圆之间的回廊像什么吗？像受控燃烧时，提前规划的防火带。"   # C本第七幕
      - "（呼唤奥丁）奥丁！"   # C本

  - act: 结局
    scene: 开解宏谟·陪走柳过生日·自首换血·化作电波
    tasks:
      - "回布雷诺肖须言空屋度日；与宏谟做'跨时间对话'回答她所有愧疚问题，给她重做八音盒+远光灯里点一轮雨月"
      - "抄缪家保险库（缪元俨临终给的地址+家族戒指），把财产交警方清算"
      - "回广府陪走柳过最后一个生日、走完第一次也是最后一次老派约会"
      - "自首领死：用干净赏金（写她名字的支票）给走柳买抑制剂、匿名为她换血续命；留信、对讲机单向陪伴"
      - "处刑前申请听对讲机声音、要十颗水煮蛋；最终化作'贝姬'频道一道电波永远陪着她"
    lines:
      - "（对警官）对抄家感兴趣吗？……我家啊。我祖坟在乐安郡南七十里，蒋式墓园里。"   # C本，抄缪家保险库
      - "（给宏谟八音盒）睡个好觉吧，妹妹。"   # C本
      - "缪宏谟，问我吧。不要再责怪自己、怀疑自己，把那些痛苦的、疑惑的问题都问出来，我会替那时的蒋伯驾一一回答。"   # C本，跨时间对话
      - "没有人给过我生命的出路，但有人给我点了一支蜡烛。"   # C本
      - "（远光灯点雨月）留给自己吧！回去吧！别淋雨啦！我已经见过雨天的月亮了——"   # C本
      - "缪宏谟，你不是医生吗？为什么总是忘了，医生要学会的第一件事，是禁止共情。"   # C本
      - "（对走柳）生辰快乐。"   # C本
      - "程走柳，我们去老派约会吧。"   # C本
      - "撑两把吧。台风天，风雨大。"   # C本
      - "走柳，我们在那里分开吧。"   # C本，警局前
      - "走柳，榕树不容人，好像是真的。"   # C本
      - "（托人送花祝福）程走柳小姐，生辰快乐。"   # C本，自首后
      - "（临刑点餐）给我十颗水煮蛋吧。谢谢。"   # C本
      - "（化作电波）程走柳，在你可寻找的范围内，我一直在。"   # C本尾声
    minigame_一墙之隔:   # C本《小剧场：一墙之隔》指定逐字台词（换血期间隔墙单向）
      - "我对此毫无办法。我想，我还是不能彻底逃出缪家的影响，我仍然是个赌徒，把爱全都暗自押给她。"
      - "我很好，多谢。"
      - "她不知道更好。她这个人，多思多虑，嘴硬心软，容易愧疚。要是知道这些，她会难过。"
      - "谢谢，麻烦了。"
      - "她爱开玩笑，您多担待，您下次可以回她一句'你最好是'，她喜欢这样轻松的氛围。"
      - "她的理想长存，身体恢复之后，她一定会重返战地。到时候，麻烦您提醒她带好对讲机。"
      - "她是我的爱人，我自然要为她考虑。"
      - "我不知道，也许是一声抱歉吧。但如果真的有机会，我想问她一句：——走柳，我答应过你，陪你一直走到死亡的终点。如今，我身体的血液将在你的生命里永远流淌，这样，算我食言吗？"
    minigame_结局小剧场:   # C本《结局·小剧场》：你是第一个开始说话的
      - "妹妹，谢谢你讲了一个这样的结局，我很喜欢。"
