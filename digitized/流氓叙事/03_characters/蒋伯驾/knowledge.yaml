# ============================================================
# relationship_beliefs：蒋伯驾视角的人物关系信念（详 relations.yaml）
# ============================================================
relationship_beliefs:
  程走柳: "cp/此生唯一的爱；台风天给我点蜡烛的人，'我们在相同的频道里'。她接近我有目的，但'真心就是真心'，我心甘情愿，只想我的罪由她结束、用命换她续命。"
  缪宏谟: "同父异母、相差两岁的妹妹（'小缪'）；少年时拽绳子打光带我爬墙、共谋杀人的人，真正的家人。我护她、瞒她危险，誓要给她黎女士未得的自由。"
  黎挽南: "三妈/恩人；母亲死后唯一给我亲情温暖的人，'柳叶刀依旧'的祝福寄主，教我做人、教我'活在这一刻'。"
  肖须言: "亦师亦友的舅舅（后才知是走柳舅舅）；教我下棋、教我舍与退、用命替我顶罪而死。我此生最痛的亏欠。"
  缪元俨: "父亲/仇人；把我当竞争催化剂与活靶子、连一句生辰快乐都不肯说。我与他互为活靶，最终反杀了他。"
  缪宏谟之外的缪家人: "防我如防贼、轻慢排斥我的一群利欲熏心者；我要掌控并推翻这个家族。"
  羌青瓷: "金狮医院院长、受控燃烧的配合者；我judge她'在乎人命、不同于伯纳德'而信任她——（第七幕揭破其=瑞法·莱诺家主）。"
  伯纳德·莱诺: "莱诺家族第一继承人；逼我勒死肖须言、注射毒素害走柳的敌人。"
  卢特·莱诺: "羌青瓷的叔叔、收我做义子的莱诺成员；也是要娶走柳的'老东西'，我嫉妒又利用他打入核心。"
  程聿怀: "布雷诺旧识、走柳的哥哥、走柳口中的人；学不会退的另一个人——（后才知）竟是军师'延迟'。我们后来从'打我脸'到联手复仇。"
  奥丁: "狂草帮老大；不打不相识、教我喊疼、两次邀我入帮、守门为我们牺牲的硬汉。我终于承认'若生在布雷诺会加入狂草帮'。"
  以撒/黛利拉: "怒河成员、（直接或间接）被我们害死亲人的人；同盟亦是日后清算的对象，我罪无可恕、甘愿伏诛。"
