# 《流氓叙事》人物关系（蒋伯驾视角） · typed
# 来源：A/B/C 分卷正文 + _profile.md + entities.yaml 交叉。
# type 取值：cp / 亲属 / 师友 / 敌 / 友 / 同盟 / 上下级 / 化名 / 同事 …
# subjective=true 表示这是蒋伯驾的主观认知（可能不完全/含假信念，详见 knowledge.yaml）。

character: 蒋伯驾
aliases: [将伯驾, Bojia Jiang, 电台哥, 摇滚哥, 小蒋, 蒋先生, 缪先生]

relations:

  # ---- cp / 爱情 ----
  - target: 程走柳
    type: cp
    subtype: 爱人/此生唯一爱情/前任→复合
    detail: >
      台风'贝姬'天她以陌生人身份为我点冷光烟花、说'生辰快乐'，让我第一次活过来。后在课堂、卢特府(她做'小妈')、
      械斗、东南亚、荧光海一次次重逢；'我们在相同的频道里'(对讲机贝姬)。她为搜证逮捕我而接近我，我心甘情愿，
      最终自首换赏金为她买药、匿名换血续命，化作电波永远陪她。
    subjective: true

  # ---- 亲属 ----
  - target: 缪宏谟
    type: 亲属
    subtype: 同父异母妹妹（相差两岁，'小缪'）
    detail: >
      唯一真正的家人。少年时她拽绳子打光带我爬墙祭母、共谋杀掉逼她下嫁的老商人；我送她劳斯莱斯银刺与车牌A00001、
      做八音盒；后联手反杀缪元俨、营救黎挽南。我护她、瞒她危险，誓给她黎女士未得的自由。
    subjective: true
  - target: 缪元俨
    type: 亲属
    subtype: 生父（同时是仇人）
    relation_quality: 敌对
    detail: >
      缪家家主'俨王'，醉酒强暴我母亲生下我又扫地出门；把我当竞争催化剂与活靶子，连一句生辰快乐都不肯说。
      '从今以后，你与缪家，互为活靶'。最终我用军阀为助力反杀了他、篡改遗嘱接掌缪家。
    subjective: true
  - target: 蒋沁春
    type: 亲属
    subtype: 生母
    detail: >
      缪家保洁员，怀我被逐、独自把我养大，叮嘱我'不要成为你父亲那样薄情寡义的混蛋'。久病后自己拔氧气管自杀解脱，
      留下'没有母亲愿意成为子女的拖累/我只是纸飞机不要带着我前行'——这两句后来被我借给黎挽南演假死。
    subjective: true

  # ---- 师友 / 恩人 ----
  - target: 肖须言
    type: 师友
    subtype: 亦师亦友的舅舅（后才知是程走柳的舅舅）
    relation_quality: 此生最痛的亏欠
    detail: >
      缪家宴会唯一善待我的大人，教我下棋、教我'舍与退'、设计拳头暗语(左拳你先走/右拳我先走)全为保全我；
      与我秘密合作搜证。金狮医院屠杀后他把我暗网账户改成他自己的替我顶罪，被伯纳德逼我亲手用绳勒死。
      死时仍只攥右拳('我先离开')。我把他改葬在能见旭日的山岗。
    subjective: true
  - target: 黎挽南
    type: 师友
    subtype: 三妈/恩人（缪宏谟之母、被迫嫁入缪家的名医）
    relation_quality: 母亲一样的存在
    detail: >
      母亲死后唯一给我亲情温暖的人；为她写贺卡'祝来日自由时，柳叶刀依旧'。我与她、宏谟联手做她'假死'获自由；
      后她被莱诺家族绑架、为救村中病人自愿赴死，留我一支录音笔铁证。她教我'活在这一刻''幸福可能无用，但幸福万岁'。
    subjective: true

  # ---- 敌 ----
  - target: 伯纳德·莱诺
    type: 敌
    subtype: 莱诺家族第一继承人
    detail: >
      要我做'投诚礼'亲手勒死肖须言；给走柳注射无解血液毒素；'创造圣女'煽动大屠杀。
      （后于2001/5/2死于非命，凶手成谜——我后来知道怒河与此相关。）
    subjective: true
  - target: 卢特·莱诺
    type: 敌
    subtype: 羌青瓷的叔叔/我的莱诺'义父'（同时是要娶走柳的'老东西'）
    relation_quality: 利用与嫉妒并存
    detail: 有收义子癖好，被肖须言点拨而被我'认作义父'打入莱诺核心；却又娶程走柳做夫人，令我嫉妒发狂。
    subjective: true
  - target: 莱诺家族
    type: 敌
    subtype: 组织/卧底对象
    detail: 百年新闻世家，实则煽动战争贩武；我潜伏多年要揭露并推翻它。'谎言的大师、伪装的天才'。
    subjective: true
  - target: 缪家
    type: 敌
    subtype: 家族/出身的牢笼
    detail: 防我如防贼、轻慢排斥我的利欲熏心者；我要掌控并推翻它，最后把家产抖给军阀、把保险库交警方清算。
    subjective: true

  # ---- 化名 / 认知不全（含假信念，详见 knowledge.yaml beliefs） ----
  - target: 羌青瓷
    type: 同盟
    subtype: 受控燃烧的配合者/金狮医院院长
    alias_truth: 羌青瓷 = 瑞法·莱诺（莱诺家主，第七幕由蒋伯驾当众揭破）
    belief_note: >
      我judge她'在乎人命、和伯纳德不一样'才信任她配合受控燃烧——此信任动机被利用(actually_true:false)；
      1995—2000我以为她只是莱诺里和我一样'不被看好的'普通心理医生/院长(认知不全)。
    subjective: true

  # ---- 友 / 同盟 ----
  - target: 程聿怀
    type: 友
    subtype: 布雷诺旧识/走柳的哥哥/'学不会退的另一个人'
    alias_truth: 程聿怀 = 布雷族军师'延迟'（第五幕揭晓）
    detail: >
      1995布雷诺建台时相识，从养妹妹心得聊到新闻；他是走柳口中要打听的人。后从'为走柳打我脸'到与我联手复仇；
      第五幕才知他竟是'延迟'。我曾想把他介绍给肖须言看看。
    subjective: true
  - target: 奥丁
    type: 友
    subtype: 狂草帮老大/怒河表面指挥官
    relation_quality: 不打不相识→惺惺相惜
    detail: >
      金狮医院械斗中并肩御敌、教我'疼要喊出来'；两次邀我入帮(电台哥→摇滚哥)，我终承认'若生在布雷诺会加入狂草帮'。
      第七幕守门为我们牺牲、踏上'无声之旅'。
    subjective: true
  - target: 怒河
    type: 同盟
    subtype: 复仇组织（真正幕后创始人=缪宏谟与程走柳，第五幕揭晓）
    detail: 我从缪家急调军火交给奥丁支援；与其结成'先推翻莱诺、私怨日后再算'的临时同盟。
    subjective: true
  - target: 以撒
    type: 同盟
    subtype: 怒河杀手（被我们直接或间接害死亲人的人）
    relation_quality: 同盟亦是日后清算对象
    detail: 他帮我们断后、带回黎挽南遗体；'他冷面，但心是热的'。我对他与黛利拉罪无可恕、甘愿伏诛。
    subjective: true
  - target: 黛利拉
    type: 同盟
    subtype: 怒河杀手
    relation_quality: 同盟亦是日后清算对象
    detail: 第五幕同被绑、后并肩复仇；其'阿奇'我并不深知（黛利拉解离障碍真相非我所知）。
    subjective: true
