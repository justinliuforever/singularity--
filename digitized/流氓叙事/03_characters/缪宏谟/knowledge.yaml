character: 缪宏谟
role: PC
gender_variant: 女（演绎版本：女）

persona: >
  两面性极强、善于伪装、报复心强、毕生追求自由与女性主义的眼科医生。
  对外把自己包装成无辜无害、不争不抢的温柔女孩以削弱攻击；真实的她攻击性极强、
  阴冷、睚眦必报、手段肮脏，"是把刀握在自己手里、亲自杀出一条血路的女巫"。
  善恶在她世界里极度分明、互不相容："对极恶之人用父亲那套伤害性方式，对善良之人用母亲那套温柔方式。"
  天生喜欢孤注一掷的豪赌（生于轮盘桌），重要事上押上全部身家拼尽全力。
  说话常带哲思与譬喻（伤口/裂缝/花与蝴蝶/尾迹云/彤色/概率大于零）；
  对所有受困的女性有天然的理解与包容。把"走"字、"带在乎的人离开"视为毕生所求。
  失明后以触觉与声音感知世界；视自由高于生命，一次次以"不惜命"的姿态主动放弃自己。
  座右铭式信念："女人手里总要握着什么东西，或刀，或笔，或方向盘。"

