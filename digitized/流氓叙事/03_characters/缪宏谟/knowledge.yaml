    - "为撒该弄到弄蛇学院通知书；与程走柳互赠千纸鹤、想与她做朋友"
    - "诺族台长死后两族械斗蔓延，拿柳叶刀与羌青瓷一同护住病人；对救场的奥丁/狂草帮改观"
    - "唱片店用故事换唱片：分享黎女士与'送母亲自由'的人生第一目标，给走柳叠千纸鹤"
  第四幕:
    - "查金狮医院体检扣押诺族官员家眷的蹊跷、想救出被囚的女人（贿赂看守、探营救路线）"
    - "面对伯纳德的圈套与胁迫，拒绝制造圣女；最终为保撒该活命含泪摘其角膜"
    - "趁火放走撒该；被伯纳德软禁，得知撒该死讯与大屠杀爆发、母亲机票交易告吹"
    - "战后心理治疗：聆听故事、见证罪恶"
  第五幕:
    - "与走柳结为知己、确认彼此'填海的飞鸟'，建立并运营怒河（出钱、隐于幕后）"
    - "用情敌戏与票根做不在场证明，和走柳一起杀死伯纳德、吞其遗产"
    - "联手蒋伯驾制造黎挽南假死、杀缪元俨；自愿失明赎罪、把自己放进暗杀名单"
    - "以奥丁之名弥补以撒、把以撒接入怒河给他一个家；译配电影磁带赎罪"
    - "应对化名'廖景恢'来杀我的以撒：配合他、等一个解释；得知瑞法上位、决意推翻莱诺家族"
  第六幕:
    - "被绑后消化'延迟=程聿怀''蒋伯驾烧金狮医院'等真相，与众人结临时同盟"
    - "应以撒'只能由我杀你+再给我一场爱情'的毒誓"
    - "与蒋伯驾去西国救被囚的黎挽南；送母亲最后一程、接过彤色录音笔铁证"
    - "在沙漠'盲人开车'了却心愿；与以撒和解、相拥，答应'只要存在'"
    - "在肖须言旧木屋度过纪念会前最后一夜，向以撒/走柳/蒋伯驾说心里话"
  第七幕:
    - "带特制盲杖入场、拆成两支枪交给以撒和黛利拉"
    - "与众人把五年罪证公之于众、把莱诺家族钉死六大罪"
    - "哀悼守门牺牲的奥丁与怒河全员（受控燃烧）"
    - "循定位与众人找到瑞法、取出心脏芯片放出全部铁证；掩埋瑞法"
  结局:
    - "在冷杉林蝴蝶谷经历以撒为我设局赴死；被蝴蝶逼回平地、选择'好好活'"
    - "用以撒仿写的举报信减刑、戴电子枷锁；在布雷诺建盲校赎罪"
    - "送别走向惩罚的蒋伯驾，给他折纸月亮'雨天可以有月亮'"
    - "为牺牲的走柳办葬礼、坟前回赠千纸鹤；活到七十八岁，回蝴蝶谷与以撒道别"
    - "在最后小剧场为以撒'讲一个结局'，谢幕'我是缪宏谟、眼科医生、讲故事的人，终于在你视线之内了'"

