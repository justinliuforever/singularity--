  程走柳: "知己/'一起填海的飞鸟'/演了多年的情敌；从'用病历叠千纸鹤'第一面就命定。怒河的另一位创始人，与我同样把名字写进名单、同样想赎罪——但我希望她活下来，代替我的眼睛见证世界。"
  蒋伯驾: "同父异母、相差两岁的哥哥（更像并肩作战的战友）；少年时共谋杀人、为我一次次演戏退婚、用一生承担缪家军火重压。我不要他保护我，我也要他自由。"
