    - "与以撒互撕面具、确认彼此是同类，共同下哑药报复辱骂者"
    - "配合羌青瓷火柴疗法：自称'有疑问需要帮助'；问退婚之法、试探以撒对年龄国籍差异的想法"
  第三幕:
