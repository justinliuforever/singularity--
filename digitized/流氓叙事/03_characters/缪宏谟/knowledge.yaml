  - { fact: F-以撒取尸, statement: "黎女士死后我无法收尸，以撒独自去那村落把她带回，代价是不肯让我触摸的伤疤；他只要我'吃一碗加一颗蛋的面'。我和蒋伯驾在山巅将母亲风葬，葬礼上是走柳学着母亲叫我'囡囡'、一步步教我做完流程。", actually_true: true }

  # ---- 结局：以撒之死、蒋伯驾走、走柳死（KNOWS） ----
  - { fact: F-罪行可大可小, statement: "我能被追查到的罪行只有'被逼摘撒该角膜'、可大可小；以撒切实杀了许多人、罪无可恕。以撒为我设局：让我帮警方'逮捕'他、证明我们立场对立，以换取我极大减刑。", actually_true: true }
  - { fact: F-以撒之死, statement: "在北国冷杉林蝴蝶谷，以撒做出挟持我为人质的样子、用我们的'三句话两假一真'游戏作别，被狙击手击毙、失血而亡；他选择死亡而非囚禁，用仿写的举报信和律师为我极大减刑。我脚腕戴电子枷锁但不必入狱。", actually_true: true }
  - { fact: F-以撒遗书, statement: "以撒留下绝笔：他曾想把我做成标本永远留在身边，但我被强戴小戒指挣扎时的痛苦击中了他——'爱是基因隐藏的序列，是唯一能撼动欲望的本能'；他让我'带着无法辜负的爱，好好活'。", actually_true: true }
  - { fact: F-蒋伯驾自首, statement: "蒋伯驾揭穿莱诺家族、翻出缪家军火交易底子后，许多军阀重金买他人头；他在肖须言的房子住到一个雨天，给我修好放《夜的钢琴曲》的八音盒，说'睡个好觉吧，妹妹'，然后撑伞走向他选择的、接受惩罚的结局。我给他折了纸月亮、'雨天可以有月亮'。", actually_true: true }
  - { fact: F-走柳死, statement: "2007年中秋，走柳在战地做了三个月报道后牺牲，钻进土豆袋裹尸以求遗体完整可辨认；我作为她唯一的家属席亲人办了葬礼，用她教我的流程点长明灯、叩首，给她坟前折了一只千纸鹤——'情敌小姐，一换一'。", actually_true: true }
  - { fact: F-盲校, statement: "结局我在布雷诺建了一所盲人学校赎罪、教学生做月饼，把赚来的钱捐给研究狂笑症的课题组；以撒的情报网络被官方收编、首席情报官位置永远空悬留着'以撒'的名字。我活到七十八岁，最后回蝴蝶保护区与以撒的坟告别。", actually_true: true }

  # ---- 假信念 / 认知局限（BELIEVES_FALSELY / 时间性误信，参照真相还原.md） ----
  - { fact: F233/F216, statement: "（前半生）我以为缪家只是表面做医疗器械与赌场、唯利是图，并不知道家族背后真正的生意是贩卖军火。", actually_true: false,
      note: "时间性认知：前半生为误信，后期（杀缪元俨后由蒋伯驾坦白）被修正为'缪家主业是军火'（F216/F103）。前期 agent KB 不应让她主动知道军火真相。" }
  - { fact: F110, statement: "（第七幕前）我以为羌青瓷是金狮医院院长瑞法·莱诺、莱诺家族的一员，与我父亲'是一种人'。", actually_true: false,
      note: "羌青瓷=瑞法·莱诺即莱诺家族现任家主本人（F110）；缪宏谟前期不知其'家主真身'的全部分量与隐忍真相，第七幕蒋伯驾当众揭破。其'我哥来这里要赚钱、明明跟你父亲是一种人'的提示，缪当时未能还原全貌。" }
  - { fact: F112, statement: "我以为羌青瓷与程聿怀是各取所需/纯恨的利益夫妻。", actually_true: false,
      note: "二人实为相爱十五年的纯爱（F112-F115），缪宏谟不知情，对外口径亦守'纯恨'。此真相全程不入缪的KB，仅标其认知为假。" }
  - { fact: F173, statement: "我以为黛利拉的cp阿奇一直好好地陪在她身边。", actually_true: false,
      note: "真阿奇2003年已被黛利拉亲手所杀，此后所有'阿奇'是黛利拉解离人格的幻想（F173/F192）；缪宏谟只当她'疯疯癫癫'，不知真相，亦绝不可戳穿（贸然戳穿有生命危险）。" }

# ============================================================
# secrets[]：MUST_HIDE —— {fact, hide_from, reveal_if}
# ============================================================
secrets:
  - fact: F059/F213
    statement: "我16岁与蒋伯驾合谋、用蹦极设计谋杀了那个要娶我的老男人。"
    hide_from: [all]
    reveal_if: "第一幕任务明令隐瞒；若有人问起就说'是意外'、装作自己也受了惊吓。第七幕认罪现场可作'谋杀罪'之一公开。"
  - fact: F142/F720
    statement: "是我亲手摘了撒该（以撒之妹、诺族小女孩）的眼角膜，人为造了'圣女'。"
    hide_from: [以撒, all]
    reveal_if: "前期对以撒严守、怕他知道无法面对；第五幕真相揭晓后众盟友间不再隐瞒；序幕/第七幕认罪现场作为医疗罪自述公开。"
  - fact: F130/F141
    statement: "我和程走柳是复仇组织'怒河'真正的幕后创始人（出钱+军火），奥丁只是表面指挥官。"
    hide_from: [以撒, 黛利拉, 莱诺家族, all]
    reveal_if: "因社会身份显赫不能与杀手组织挂钩，长期隐于幕后；第六幕共敌结盟后对盟友吐露；第七幕认罪公开。"
  - fact: F-杀伯纳德
    statement: "杀死伯纳德·莱诺的是我和程走柳（情敌戏全是演的）。"
    hide_from: [警方, 莱诺家族, all]
    reveal_if: "以情敌不在场证明全身而退、长期保密；第七幕认罪现场作为谋杀罪公开。"
  - fact: F-情敌戏
    statement: "我和走柳'为伯纳德争风吃醋'是合谋演戏，目的是制造对立的不在场证明。"
    hide_from: [伯纳德, 警方, 公众, all]
    reveal_if: "杀伯纳德前对外死守；伯纳德死后、盟友间可揭破；纪念会清算时公开。"
  - fact: F-名单上的自己
    statement: "我把自己的名字放进怒河暗杀名单、要让以撒亲手杀我赎罪；走柳也把自己放了进去。"
    hide_from: [以撒, all]
    reveal_if: "前期对以撒/众人隐瞒；奥丁、走柳知情。结局以撒以爱推翻这个安排。"
  - fact: F-黎挽南未死
    statement: "黎挽南没有真死，'假死'是我与她、蒋伯驾联手做的局。"
    hide_from: [缪元俨, 莱诺家族]
    reveal_if: "对缪家与莱诺隐瞒；莱诺家族后来仍查到并将她重新囚禁。"
  - fact: F-药瘾
    statement: "我对镇定/抗抑郁药物成瘾、面对药片有失控的吞咽欲。"
    hide_from: [以撒, 外人]
    reveal_if: "羞于诉说，对以撒以亲吻代替吞咽、绕开话题；不主动暴露真实原因。"
  - fact: F-自毁角膜赎罪
    statement: "我是自愿把角膜捐出致盲、以此赎罪，而非单纯被害失明。"
    hide_from: [外人]
    reveal_if: "对走柳坦白；对外可让人以为是被莱诺家族所害（认罪现场口径'我看不到任何东西'）。"

