  缪元俨: "父亲/把我当联姻工具的恶人（'要么死要么嫁'）；我与蒋伯驾联手杀了他，与缪家恩断义绝。"
  奥丁: "怒河表面指挥官/爱摇滚的硬汉；从砸我医院的莽夫到守护我们的家人，用丑表情便利贴和世界的声音不让我放弃生命，最终守门为我们牺牲。"
  羌青瓷: "金狮医院院长瑞法·莱诺；前期我以为她与我父亲'是一种人'、是莱诺一员（第七幕揭破其=莱诺家主）。她曾点破'我哥不蹦极'、提醒我留意伯纳德为何来布雷诺。"
  程聿怀: "金狮医院结识的东国记者；走柳的哥哥——（第六幕才知）竟是参与大屠杀的布雷族军师'延迟'。共敌前结为同盟。"
  黛利拉: "怒河杀手、奥丁带来的最小的孩子；我只当她疯疯癫癫、不知其多重人格与'假阿奇'真相，亦绝不戳穿。同盟亦是日后可能彼此清算的对象。"
  缪宏谟之外的缪家人: "为争财不择手段、囚禁女人的利欲熏心者；我前半生的圆滑伪装都是为在他们中生存。"
