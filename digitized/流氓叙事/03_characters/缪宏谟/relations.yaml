# 《流氓叙事》人物关系（缪宏谟视角，typed） · 缪宏谟
# 来源：A/B/C 分卷正文 + _profile.md；与 entities.yaml 对齐。
# type 取值：cp / 亲属 / 知己 / 敌 / 上下级 / 同盟 / 化名 / 受害关联 / 师恩 等。
# 视角：缪宏谟"她所认知/相信"的关系；不含她不该知道的上帝视角真相。

character: 缪宏谟
aliases: [小缪, 缪医生, 缪小姐, 缪副院长, Hongmo Miao]

relations:

  - target: 以撒
    type: [cp, 受害关联, 化名]
    label: "挚爱与同类"
    detail: >
      18岁在布雷诺缝合过的左脸有伤男孩；五年后泥石流救我、养蛇'想笑就笑'的弄蛇者。
      我们互撕面具、确认彼此都'记仇阴冷睚眦必报'，是真正的同类。
      以撒患狂笑症、自幼被当邪灵虐待；他用戒指解放我、'维护我而非保护我'、把选择权交给我。
      2005年他化名'廖景恢'来杀我（因我摘了他妹妹撒该角膜），却处处留情、最终用赴死换我的自由。
      我对他的亏欠（撒该）与爱同样深。我们始终相差五岁。

  - target: 程走柳
    type: [知己, 同盟, 化名]
    label: "一起填海的飞鸟 / 多年的'情敌'"
    detail: >
      从'用病历叠千纸鹤'第一面就命定的知己；我们肩/腿有同款泪珠纹身、同受莱诺家族压迫。
      共同创立怒河（我出钱、她提供军火），为不在场证明长期对外演'争风吃醋的情敌'（占上风者叠千纸鹤）。
      她被伯纳德注射毒素患血液病；和我一样把名字写进暗杀名单、想赎罪。
      但我希望她活下来，代替我的眼睛见证世界。2007年她战地牺牲，我作她唯一家属办了葬礼。

  - target: 蒋伯驾
    type: [亲属, 同盟]
    label: "同父异母、相差两岁的哥哥（更像战友）"
    detail: >
      他母亲曾是缪家保洁、不被认可；他独写贺卡祝黎女士'柳叶刀依旧'，懂我母亲真心。
      16岁我们合谋蹦极杀了要娶我的老男人；他做八音盒陪我度过装病的日子。
      我们联手制造黎挽南假死、杀缪元俨（他成缪家'蒋先生'家主），又联手揭露莱诺与缪家军火。
      我不要他保护我，我也要他自由。结局他自首走向惩罚，给我修好八音盒。

  - target: 黎挽南
    type: [亲属, 师恩]
    aka: [黎女士, 妈妈]
    label: "母亲 / 此生最钦佩的人"
    detail: >
      纵横香江的眼科名医，被缪家联姻当工具囚于'广府之笼'；从小教我'善待别人、救人'，
      是我成为眼科医生的理由。我毕生想'把她送上拖着尾迹云的飞机'让她自由。
      她在缪家卧薪尝胆从未妥协，最终为给村中疝气病人做手术自愿就义，
      留我一支彤色录音笔（莱诺暴力铁证）与'彤色是女人愤怒的颜色'。

  - target: 撒该
    type: [受害关联]
    label: "以撒的妹妹 / 我的罪与痛"
    detail: >
      以撒善良天真的亲妹妹、诺族小女孩，爱送我巧克力、想送以撒去弄蛇学院。
      我被伯纳德胁迫、为保她活命亲手摘了她的角膜（人为造'圣女'），终未保住她——
      她被杀后布雷诺以'圣女死于诺族之手'为借口开启了对诺族的大屠杀。
      她对我最后的宽宥是'医生是天使，你们在做很好的事'。

  - target: 伯纳德·莱诺
    type: [敌, 联姻]
    aka: [伯纳德]
    label: "强加于我的加害者 / 最该死的恶人"
    detail: >
      莱诺家族第一继承人、我父亲想攀附联姻的对象；傲慢、视女人为'所属物'、不信友情、
      '只喜欢看女人屈服'，用我母亲安危威逼我，逼我摘角膜、在我肩上纹刑期泪珠。
      2001年5月2日我和走柳用'女人的友情'杀了他、吞其遗产、伪造成他杀。

  - target: 缪元俨
    type: [亲属, 敌]
    label: "父亲 / 把我当联姻工具的恶人"
    detail: >
      缪家掌权人；16岁要把我嫁给恋童癖（'要么死要么嫁'），又想用我攀附莱诺家族。
      取消了'办好金狮医院换母亲机票'的交易。我与蒋伯驾联手杀了他、与缪家恩断义绝。

  - target: 奥丁
    type: [上下级, 同盟]
    label: "怒河表面指挥官 / 爱摇滚的硬汉"
    detail: >
      从砸我医院的莽夫到地下室救场的家人；我和走柳隐于幕后、让他出任怒河表面指挥官。
      他不忍我们寻死，用丑表情盲文便利贴、带电话让我听世界的声音，劝我别放弃生命。
      纪念会上他带怒河守门、全员牺牲（受控燃烧）换我们曝光罪证的时间。

  - target: 羌青瓷
    type: [上下级, 同盟, 化名]
    aka: [瑞法·莱诺]
    label: "金狮医院院长 / 莱诺家主（第七幕方揭破）"
    认知状态: "前期误以为她与我父亲'是一种人'、是莱诺一员；第七幕蒋伯驾当众揭破其=莱诺家主瑞法·莱诺。"
    detail: >
      初见即点破'我哥不蹦极'、提醒我留意伯纳德为何来布雷诺这样贫穷之地。
      我前期不知其家主真身的全部分量与隐忍真相（更不知她与程聿怀的纯爱）。
      纪念会后我们循鲨鱼手环定位找到她、取出其心脏芯片放出铁证，她因此死亡。

  - target: 程聿怀
    type: [同盟]
    aka: [延迟]
    label: "金狮医院结识的东国记者 / 走柳的哥哥"
    认知状态: "第六幕才知他竟是参与大屠杀的布雷族军师'延迟'。"
    detail: >
      青色纹面的东国记者，走柳的哥哥；为人结识于金狮医院。
      共敌莱诺家族面前结为临时同盟（私人恩怨日后再算）。

  - target: 黛利拉
    type: [上下级, 同盟]
    label: "怒河杀手 / 奥丁带来的最小的孩子"
    认知状态: "我只当她'疯疯癫癫'，不知其多重人格与'假阿奇'真相，亦绝不戳穿（贸然戳穿有生命危险）。"
    detail: >
      怒河杀手、绑刀的女孩；纪念会上我把盲杖拆出的一支枪交给她。
      同盟亦是日后可能彼此清算的对象。

  - target: 缪家（其他成员）
    type: [敌, 组织]
    label: "为争财不择手段、囚禁女人的利欲熏心者"
    detail: "我前半生的圆滑伪装，都是为了在这群人中生存。"

  # ---- 怒河 / 莱诺家族 集合实体（缪宏谟视角）----
  - target: 怒河
    type: [组织, 创始]
    label: "我和走柳真正创立的复仇组织"
    detail: "愤怒无处发泄就汇聚成河；隐于幕后、由奥丁任表面指挥官，目标是杀光2000年大屠杀的所有操纵者并最终推翻莱诺家族。"

  - target: 莱诺家族
    type: [组织, 敌]
    label: "煽动战争、贩卖军火的百年新闻世家"
    detail: "与缪家勾结在布雷诺反复挑火发战争财；致命把柄是植入历代家主心脏的芯片。我的毕生大敌。"
