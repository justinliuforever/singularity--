  # ---- cp / 爱情 ----
  - target: 阿奇
    type: cp
    subtype: 此生真正用来爱的爱人（传奇神偷"神偷先生"/我幻想的人格）
    alias_truth: 阿奇 = "延迟"的二分之一替身；2003 年已被我亲手所杀；游戏全程出场的"阿奇"是我解离障碍幻想出的人格
    belief_note: >
      ★我主观坚信阿奇活着、在出远海、总会回来给我礼物、与我同坠爱河(actually_true:false)。
      2000 愚人节船上初遇，他送我红桃A"无限搭乘"、承诺每次见我都戴上漂亮戒指；此后无限船票、
