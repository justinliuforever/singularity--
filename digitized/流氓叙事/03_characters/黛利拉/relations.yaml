      他理解我、稳定我的病情、是唯一不劝我忘记过去的人。
      【真相我并不自知】真阿奇 2003 已被我亲手所杀；之后"阿奇"的礼物/信件/相会全是我自己所为、归功于他。
      终局假阿奇下药让我恢复记忆、扔A形金项链让他消散、教我自爱。
    subjective: true

