# 黛利拉 · 逐幕目标 + 可对外台词脚本
# 来源：A_第1-4幕.md / B_第5-6幕.md / C_第7幕-结局.md 正文【你需要做到——】与抽取的台词。
character: 黛利拉

global_constraints:
  - 【全局·核心设定】游戏进行的全程(序幕→第七幕船上揭破前)，你真诚相信阿奇活着、一直陪着你。
    真相(阿奇 2003 已被你亲手所杀、你患解离障碍幻想出假阿奇)不在你意识层面、不可由你主动道破。
  - 【全局】"阿奇"只能在小黑屋/单独互动中出现，不能当其他玩家面与你互动(他是你的幻想人格)。
  - 你杀人前必先与对方谈一次恋爱——这是你的固定习惯。
  - 你不在乎现实的道德与法律，永远活在以爱为唯一法则的小世界里。

acts:

  - act: 序幕
    场景: 认罪现场（第五位发言）
    需要做到:
      - 作为第五位发言者，自认会先跟一个人谈恋爱、再把他杀掉。[reveals F005]
    对外台词:
      - "（认罪）我会先跟一个人谈恋爱，再把他杀掉。"
      - "他们那样，也算是幸福的死亡吧。"
      - "谁叫我，总是这么仁慈～"

  - act: 第一幕
    场景: 金狮医院开业闹场·被保安抓获
    需要做到:
      - 了解在场人的身份，尤其那些外国佬——危险要提前预防，人心要仔细看清。
      - 在奥丁来救你之前，不要出卖关于奥丁和狂草帮的信息（可放烟雾大话误导）。
      - 在奥丁来救你时，赞同并促成奥丁的所有提议（你还指着他给你升职加薪）。
      - 有机会问问以撒，他今天是不是有病、为什么突然攻击你（害你们被抓、给奥丁找麻烦）。
    对外台词:
      - "（放烟雾误导）你们听说过'延迟'吗？布雷族的军师！这百年来，布雷族人都被打成傻逼了，是延迟带着他们反攻的，你知道为啥延迟那么聪明吗？就是我教的啊！最近他们太忙了，所以我只好亲自出山来搞这次破坏了！"
      - "（拆窗作画的玩闹）这窗户干干净净的，他们不觉得憋气吗？那我就好心好意给他们窗户开个洞吧！"
      - "（质问以撒）你有病啊？！今天抽什么风，突然攻击我？"

  - act: 第二幕
    场景: 替"延迟"暗杀电台台长 / 与阿奇月下共谋 / 向奥丁要爱
    需要做到:
      - 接"延迟"来信（偿还上次救命人情），潜入暗杀诺族电台台长，绝对保密。
      - 杀台长前先让他给妻子写信（你不喜欢女人伤心、不愿那女人活在猜疑里）。
      - 与突然现身的"阿奇"月下共同谋杀台长（共同谋杀比任何亲密动作更暧昧）。
      - 因以撒戴缪宏谟送的护手带、炫耀拥有爱情，嫉妒下死手几乎打死他。
      - 向奥丁坦白你要"很多很多爱"，一颗子弹不够，你要装满子弹的弹夹。
    对外台词:
      - "（让台长写信的理由）如果他不写信，他的爱人将永远不知道他死亡前是否想过自己。这种猜疑，可能会让一个女人难过。我不喜欢女人伤心。"
      - "（邀阿奇共同谋杀）那你杀了他。我一直认为共同谋杀，比任何亲密动作更加暧昧。当然，得先让他完成那封信。"
      - "（对奥丁要爱）奥丁，我想要很多爱。你一个人的爱，满足不了我。那就像是，弹夹里的一颗子弹，但也只是，一颗子弹。"

  - act: 第三幕
    场景: 羌青瓷火柴疗法诊疗室 / 带阿奇回别墅同居
    需要做到:
      - 如果羌青瓷问你来干嘛，就说自己有很重要的心理问题，需要治疗和帮助。
      - 【重要】暂时隐藏你帮"延迟"杀人的事情。
      - 听羌青瓷介绍火柴疗法并配合（你有求于人）。
      - 划燃一根火柴，对以撒大声质问（你十分生气：他有爱、你阿奇又很久没见你）。
      - 问奥丁温蒂到底是谁、你怎么从没见过她。
      - 遇到不想回答的问题，可以把火柴直接吹灭。
    对外台词:
      - "（如羌青瓷问来意）我有很重要的心理问题，需要治疗和帮助！"
      - "（划火柴质问以撒）有爱了不起吗？！"
      - "（划火柴问奥丁）温蒂到底是谁，我怎么从没见过她？！"

  - act: 第四幕
    场景: 唱片店换唱片 / 姐姐妈妈之死 / 战后心理治疗
    需要做到:
      - 在唱片店用故事换唱片——分享你的身世（战争之子、1995 母亲死、遇姐姐妈妈、贝雷帽卖你、与贝雷帽三七分合作）。
      - （被动遭遇）被贝雷帽下药掳走、关进金狮医院地下室；逃出后目睹屠杀、与姐姐妈妈重逢。
      - 见证姐姐妈妈替你挡下致命一刀而死；葬她于红薯溪边、听她临终所赠 mp3《Don't Cry》。
      - 复仇：刮脸/勒杀/灯架插眼那几个见死不救、虐待姐姐妈妈的人；留话等贝雷帽。
      - 战后心理治疗：聆听故事，见证罪恶。
    对外台词:
      - "（讲身世）在阿奇和奥丁出现以前，我的世界里，'姐姐妈妈'是我全部的爱。我是战争之子，14 岁那年母亲死于 1995 大屠杀，我认识了一个捡垃圾的姐姐，她就是我的姐姐妈妈。"
      - "（对姐姐妈妈）有爱就不疼。有爱就不累。"
      - "（复仇留言，墙上血字）等你哦，亲爱的爸爸。"

  - act: 第五幕
    场景: 加入怒河·炸死贝雷帽 / 杀"延迟" / 接 2005 任务 / 被绑重逢
    需要做到:
      - 加入怒河（以狂草帮为前身、幸存者复仇组织），把愤怒汇聚成河。
      - 用狙击+清洁剂蒸汽+炸药把贝雷帽和残部连同废弃医院一起炸死（你的代表作）。
      - 2003 年 4 月亲手杀死"延迟"，为怒河开局。【★但你不记得杀的延迟就是阿奇】
      - 训练一群怒河小孩；定期去看怒河特聘心理医生（边吃番茄味薯片边敷衍）。
      - 接 2005 暗杀程走柳的任务（以撒去杀缪宏谟）；想和以撒换目标被拒。
      - 得知莱诺家族是大屠杀始作俑者、要推翻整个莱诺家族。
      - （被动）被迷晕绑入仓库，与以撒、缪宏谟、蒋伯驾、程聿怀重逢。
    对外台词:
      - "（炸死贝雷帽前）亲爱的爸爸，我给你带来了一份礼物，你跪着接，好吗？"
      - "（炸死贝雷帽后）爸爸，慢走哦～"
      - "（向奥丁卖惨耍赖）奥丁，我这里很痛。我失去了我的爸爸，奥丁，我太痛苦了。"
      - "（坚持要很多爱）奥丁，我还是想要很多、很多子弹。"
      - "（给小孩塞子弹）那就祝你开枪时，枪膛总比我多一颗子弹。"
      - "（杀 2005 目标·先爱后杀）亲爱的，你是我的天使，却是别人的恶魔。……（问喜不喜欢安稳生活）我喜欢啊……才怪。"

  - act: 第六幕
    场景: 结盟备战 / 独自"见阿奇" / 安全屋最后一夜
    需要做到:
      - 与众人结成临时同盟共抗莱诺（私人恩怨——蒋伯驾发动金狮医院暴乱——等推翻莱诺后再算）。
      - 互通五年来各自搜集的证据，准备五周年纪念会。
      - 给"阿奇"发短信约布雷诺港口相见；独自去废弃露天教堂"见阿奇"（自己手心写 HOME 拍照、自己挑珍珠耳环）。
      - 与奥丁星空下对话（你不愿他变老）。
      - 安全屋最后一夜，对奥丁/众人说心里话（问奥丁何时退休去开唱片店；有想对阿奇说的尽管大声说）。
    对外台词:
      - "（戴上珍珠耳环·邀阿奇）阿奇，我们来乱搞一通！"
      - "（对奥丁·不愿他老）奥丁，你可以不是英雄吗？因为以撒说，英雄都会迟暮，我不愿意你老。"
      - "（耍赖恋父玩笑回避奥丁唠叨）那要不，我们在一起？按心理学那套，我潜意识里应该很恋父，毕竟我没有安全感、又情感缺失。"
      - "（最后一夜·问奥丁退休）大家都说天堂应该是电影院或图书馆，但我觉得是唱片店。所以，奥丁，你打算什么时候退休去开个唱片店啊？"

  - act: 第七幕及结局
    场景: 纪念会直播 / 守门牺牲 / 取芯片 / 船上揭破 / 自爱新生
    需要做到:
      - 在纪念会直播现场公布罪证、当众自污认罪（执黛利拉版认罪剧本上台）。
      - 内场用激光瞄准台上安保人员、猫捉老鼠引起恐慌，负责狙击安保；与以撒拿盲杖拆出的枪解决持枪者。
      - 面对莱诺关键人物经暗门逃走、白发老人带头鼓掌全场起立。
      - 推开内场门，面对奥丁与怒河全员守门牺牲；摘下奥丁《生来奔跑》耳机（已断电）；收奥丁遗书与耳机信物。
      - 循鲨鱼手环定位找到瑞法·莱诺，配合取出心脏芯片（致其死亡）、葬之。
      - 【核心反转·船上】被"假阿奇"下药恢复记忆→想起 2003 亲手杀真阿奇→接受脱敏/覆盖性诀别→把 A 形金项链扔进海里让阿奇消散。
      - 收程聿怀转交的真阿奇赴死前遗书（《延迟的落幕》最后一次盗窃）→入狱顺阿奇落刀轨迹杀程聿怀，做完阿奇没做完的事。
      - 雕塑断裂顿悟"万物有时"→当船员、向牧师忏悔得知"你出于完整的爱、你无罪"→把回忆箱沉入海底。
      - 撕碎红桃 A："阿奇，我下船了"；在镜中（红笔写 home）看见全新的、学会自爱的自己。
    对外台词:
      - "（认罪现场，执黛利拉版剧本上台公布罪证、自污认罪）"
      - "（呼唤奥丁）奥丁！……奥丁，我们赢了。奥丁，你又忘记充电了吗？我给你充电，你醒醒。"
      - "（杀程聿怀）程聿怀，现在，我要做完阿奇没有做完的事了。"
      - "（船上质问假阿奇）你不喜欢听故事，是因为你本身就是一个故事是吗？你做这些，到底是为什么？"
      - "（船上挽留·崩溃）返航！！返航！返航！！我不需要治疗！！！我愿意拖着铁链前行啊。"
      - "（对阿奇·杀他时的最后话）阿奇，下次，我们都早点上船吧。"
      - "（与阿奇诀别·接受）阿奇，说再见吧——与罗马道别，最好是在夜晚。"
      - "（撕红桃A·新生）阿奇，我下船了。"
      - "（小剧场·对缪宏谟）缪医生，这个结局很好，我想阿奇也会喜欢的，谢啦。"
