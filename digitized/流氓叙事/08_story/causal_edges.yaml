  - {from: E090, to: E116, type: causes, note: 怒河复仇→2005清算→莱诺倾覆}

  # —— 速记链③：程聿怀失父+被抹忆→二次成延迟→像莱诺→终清算→死后方知相爱 ——
  - {from: E033, to: E046, type: causes, note: 失父查真相→二次成为延迟}
  - {from: E043, to: E081, type: enables, note: 被抹忆失记忆+创伤→变得像莱诺参与挑屠杀}
