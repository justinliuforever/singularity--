  # —— 情感网：阿奇×黛利拉时序演变（相爱→屠杀→手刃→解离→自爱）——
  - {from: E081, to: E101, type: motivates, note: 程放弃布雷族致黛家人死→阿奇决意为黛复仇去杀程}
  - {from: E101, to: E102, type: enables, note: 阿奇未杀程、自陷愧疚→无法承担、最终求黛成全}
  - {from: E100, to: E102, type: enables, note: 阿奇与黛相爱→黛在知全部秘密后仍亲手成全其解脱}
  - {from: E102, to: E103, type: causes, note: 黛亲手杀阿奇→解离障碍发作、幻想假阿奇}
  - {from: E103, to: E120, type: enables, note: 假阿奇人格陪伴→结局假阿奇助黛恢复记忆学会自爱}

  # —— 情感网：以撒×缪宏谟（束缚→自由→圆满）——
  - {from: E021, to: E104, type: enables, note: 以撒缺爱/占有欲→目睹缪被戴戒指而觉醒爱是让对方自由}
  - {from: E104, to: E121, type: enables, note: 以撒转变尊重自由→结局为缪戴戒指、花开蝴蝶归}
