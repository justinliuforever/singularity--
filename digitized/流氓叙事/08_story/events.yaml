# 流氓叙事 · 客观事件层（Events）
# 忠实转录自：02_truth/阴谋网.md（加害链/复仇链/情感血缘网/动机—因果速记）、
#              00_index/timeline.md（上帝视角时间线）、02_truth/真相还原.md（F100–F202 定义）。
# 命名归一：羌青瓷=瑞法·莱诺（统一羌青瓷）；程聿怀=程雨怀；蒋伯驾=将伯驾；布雷诺=布雷德。
# 人物勿混：伯纳德·莱诺=羌青瓷兄长（后被程走柳所杀）；卢特·莱诺=羌青瓷叔叔（娶程走柳、收蒋伯驾义子，后被以撒所杀）。
# act 字段：该事件在游戏第几幕被揭示给全场；纯背景/开局前无揭示填 null。
# access: referee_only

events:

  # ============ 世界观 / 远景背景（百年）============
  - id: E001
    type: Event
    title: 莱诺家族兴起（以新闻发家，实则煽动战争卖军火）
    summary: 19世纪中期莱诺家族于西国兴起，以新闻发家、创立莱诺新闻奖，实则经常煽动舆论挑起战争、借机贩卖军火、大发战争横财。
    story_time: 19世纪中期
    act: 第七幕
    actors:
      - {char: 莱诺家族, role: agent}
    facts: [F005, F101]
    motive: 制造战争→卖武器→赚战争横财
    effect: 新闻只是幌子；主业是制造战争卖武器，为后续在布雷诺反复挑火埋下家族基因

  - id: E002
    type: Event
    title: 殖民者强行划分布雷族与诺族
    summary: 百年前发达国家殖民布雷诺，一高官强行把民众划分为布雷族、诺族，把个子高/皮肤白的诺族定为优等民族与统治阶级（官方高层/总统皆诺族）。
    story_time: 百年前（殖民期）
    act: 第一幕
    actors:
      - {char: 殖民高官, role: agent}
      - {char: 布雷族, role: patient}
      - {char: 诺族, role: beneficiary}
    facts: [F001, F002, F016]
    motive: 殖民统治分而治之
    effect: 两族不再和睦；布雷族被欺压，为日后种族冲突/屠杀埋下结构性裂痕

  - id: E003
    type: Event
    title: 布雷族长期被欺压（教堂/慢跑禁令等）
    summary: 殖民结束后百年两族不再和睦，布雷族被欺压（教堂仅白日许诺族入、布雷族只能晚6点钟声后入；战时士兵街头军靴慢跑震慑，慢跑后被总统禁止）。
    story_time: 殖民结束后—百年
    act: 第一幕
    actors:
      - {char: 诺族, role: agent}
      - {char: 布雷族, role: patient}
    facts: [F016, F018]
    motive: 维持统治阶级压迫
    effect: 布雷族长期受压，成为日后被煽动屠杀的火药桶

