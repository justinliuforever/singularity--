# 《流氓叙事》人物名册 / 实体对齐表
# 来源：测绘人物名册 + 线索行 related_chars 校验并入
# role: PC（玩家可操作角色，6名）| NPC（DM 扮演或剧情人物）
# aliases：含异写对齐 —— 将伯驾=蒋伯驾、程聿怀=程雨怀=小程、缪宏谟=小缪、瑞法·莱诺=羌青瓷
source_pdf: Data/流氓叙事Origin/手册/1_手册.pdf
extracted_by: opus

# ===== 玩家角色 PC（6 名，实际可操作）=====
characters:
  - name: 程聿怀
    role: PC
    aliases: [延迟, 事, Yuhuai Cheng, 程记者, 程雨怀, 小程]
    备注: >
      最复杂 PC。异写「程雨怀」「小程」均指同一人。卧底身份为布雷族军师『延迟』(F709)。
      与亲妹程走柳易混，二者均姓程、均自称「程记者」，建图务必区分。
      恋陪位绑定 NPC 羌青瓷（唱片11题注「羌青瓷致程聿怀」）。

  - name: 程走柳
    role: PC
    aliases: [走柳, Zouliu Cheng, 程记者, 走柳妹妹]
    备注: >
      程聿怀的亲妹妹。造假新闻(F714)，参与「圣女」塑造链。
      唱片10题注「羌青瓷致程走柳」、约会信《一二三路口和不止于此》收信人。

  - name: 缪宏谟
    role: PC
    aliases: [缪医生, Hongmo Miao, 缪小姐, 缪副院长, 小缪]
    备注: >
      金狮医院副院长。异写「小缪」（见《给小缪的心情便利签》《给蒋伯驾的信》）。
      摘除眼角膜致盲、人为造圣女(F720)。母亲为黎挽南（眼科医生）。

  - name: 黛利拉
    role: PC
    aliases: [Delilah, 小黛, 杀手小姐]
    备注: >
      红桃A船票持有者；与神偷先生（阿奇）链式留言相会。第四幕为「第二次」诊疗。
      奥丁留遗书/耳机给她（第八幕）。姐姐/妈妈为摩伊拉。

  - name: 以撒
    role: PC
    aliases: [Jsaac, Isaac, 小以撒, 逃跑者以撒]
    备注: >
      狂草帮成员，诺族人，患「狂笑症」。卡面英文异写「Jsaac」(=Isaac)。
      妹妹撒该被造谣为布雷族圣女。继承奥丁的笑话小本。

  - name: 蒋伯驾
    role: PC
    aliases: [Bojia Jiang, 电台哥, 蒋先生, 摇滚哥, 小蒋, 将伯驾]
    备注: >
      卧底记者。异写「将伯驾」（见通缉令）。对讲机加密频道「贝姬」。
      舅舅为肖须言。第七幕自爆卧底身份并直呼羌青瓷=瑞法·莱诺。

# ===== 非玩家角色 NPC =====
npcs:
  - name: 羌青瓷
    role: NPC
    aliases: [瑞法·莱诺, 瑞法, 夏尔之子, 金狮医院院长, 莱诺家族新任家主, 程夫人/程先生]
    备注: >
      DM 扮演主 D / 恋陪位。【关键同一性】羌青瓷 = 瑞法·莱诺(F700)，家主化名。
      性别可男可女，恋陪位随 PC 程聿怀反向匹配。父夏尔·莱诺、母黎梦鲸、兄伯纳德、叔卢特。

  - name: 阿奇
    role: NPC
    aliases: [神偷先生, 二分之一延迟, 延迟的替身, 魔术师]
    备注: DM 扮演。自称「神偷先生」，与「延迟」(程聿怀)相关；红桃A链式留言邀约黛利拉。

  - name: 奥丁
    role: NPC
    aliases: [狂草帮老大, 怒河指挥官, 大舞蹈家, 硬汉]
    备注: DM 扮演。狂草帮老大。女友温蒂。死亡演绎；遗物耳机/遗书给黛利拉、笑话小本给以撒。

  - name: 伯纳德·莱诺
    role: NPC
    aliases: [伯纳德, 莱诺家族第一继承人, 羌青瓷的兄长]
    备注: 莱诺家族第一继承人；程聿怀（延迟）曾为其策划千禧年大屠杀。

  - name: 肖须言
    role: NPC
    aliases: [蒋伯驾的舅舅, 卧底记者, 182电话号码]
    备注: 蒋伯驾的舅舅，卧底记者。⚠注意与下方「劳伦」条原始名册中误并的「肖须言」区分（见 _校验存疑）。

  - name: 卢特·莱诺
    role: NPC
    aliases: [卢特, 羌青瓷的叔叔, 莱诺家族的人]
    备注: 莱诺家族成员，羌青瓷（瑞法）的叔叔。

  - name: 黎梦鲸
    role: NPC
    aliases: [瑞法/羌青瓷的母亲, 东国心理医生]
    备注: 羌青瓷（瑞法·莱诺）的母亲，东国心理医生。

  - name: 夏尔·莱诺
    role: NPC
    aliases: [夏尔, 瑞法/羌青瓷的父亲]
    备注: 羌青瓷（瑞法·莱诺）的父亲。

  - name: 劳伦
    role: NPC
    aliases: [失职女记者(共情照片), 程聿怀父亲圈]
    备注: >
      失职女记者（共情照片相关），属程聿怀父亲（程亮冬）记者圈。
      ⚠原始名册此条 name 误录为「肖须言(程聿怀父亲圈)劳伦」，已拆正为「劳伦」；
      与上方蒋伯驾的舅舅「肖须言」为不同人，请勿混淆。

  - name: 程亮冬
    role: NPC
    aliases: [程聿怀/程走柳的父亲, 记者, 1994年遭污蔑死亡]
    备注: 程聿怀与程走柳之父，记者，1994 年遭污蔑死亡。

  - name: 黎挽南
    role: NPC
    aliases: [缪宏谟的母亲, 眼科医生]
    备注: 缪宏谟的母亲，眼科医生。

  - name: 温蒂
    role: NPC
    aliases: [奥丁的女朋友]
    备注: 奥丁的女朋友。

  - name: 摩伊拉
    role: NPC
    aliases: [黛利拉的姐姐妈妈, 金狮医院大火中被砍死者]
    备注: 黛利拉的姐姐/妈妈，金狮医院大火中被砍死。

  - name: 撒该
    role: NPC
    aliases: [以撒的妹妹, 诺族小女孩, 被造谣成布雷族圣女]
    备注: 以撒的妹妹，诺族小女孩，被造谣塑造为布雷族「圣女」(F702)。

