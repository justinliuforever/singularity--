# Render Blueprint —— 双服务（后端 Web 服务 + 前端静态站）
# 部署：Render Dashboard → New → Blueprint → 选本仓库（github.com/justinliuforever/singularity--）
# 首次创建时会提示填 DEEPSEEK_API_KEY（密钥，不入库）。
services:
  # ── 后端 API：Node Web 服务（starter 常驻、无冷启动）──
  - type: web
    name: liumang-backend
    runtime: node
    plan: starter
    region: singapore
    rootDir: .
    healthCheckPath: /health
    # pnpm monorepo：根目录装全部 workspace，再产出 shared 的 dist（前后端都 import 它）
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build:shared
    startCommand: pnpm -F @liumang/backend start
    autoDeploy: true
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false # 密钥：仅 Blueprint 首次创建时在面板填入，绝不进 git
      - key: DEEPSEEK_MODEL
        value: deepseek-chat

  # ── 前端：Vite 静态站（全球 CDN、免费、无冷启动）──
  - type: web
    name: liumang-frontend
    runtime: static
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build:shared && pnpm -F @liumang/frontend build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # 前端在浏览器里跑，必须连后端【公网】URL（fromService 给的是私网 host，浏览器到不了）。
      # 后端服务名 liumang-backend → 公网 URL 默认即下面这个；若 Render 追加了后缀，部署后改这里再 redeploy。
      - key: VITE_API_BASE
        value: https://liumang-backend.onrender.com
